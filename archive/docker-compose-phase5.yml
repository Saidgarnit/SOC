
services:
  # ===== MISP Services =====
  misp-db:
    image: mysql:8.0
    container_name: misp-db
    environment:
      MYSQL_ROOT_PASSWORD: misp_root_password
      MYSQL_DATABASE: misp
      MYSQL_USER: misp
      MYSQL_PASSWORD: misp_password
    volumes:
      - misp-db-data:/var/lib/mysql
    networks:
      - soc-net
    restart: unless-stopped

  misp-redis:
    image: redis:7-alpine
    container_name: misp-redis
    networks:
      - soc-net
    restart: unless-stopped

  misp:
    image: nukib/misp:latest
    container_name: misp
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      - MYSQL_HOST=misp-db
      - MYSQL_PORT=3306
      - MYSQL_LOGIN=misp
      - MYSQL_PASSWORD=misp_password
      - MYSQL_DATABASE=misp
      - REDIS_HOST=misp-redis
      - REDIS_PORT=6379
      - MISP_BASEURL=http://localhost:8080
      - MISP_EMAIL=admin@misp.local
      - MISP_PASSWORD=Admin@123
    depends_on:
      - misp-db
      - misp-redis
    volumes:
      - misp-app:/var/www/MISP
    networks:
      - soc-net
    restart: unless-stopped

  # ===== OpenCTI Services =====
  opencti-db:
    image: postgres:15-alpine
    container_name: opencti-db
    environment:
      POSTGRES_USER: opencti
      POSTGRES_PASSWORD: opencti_password
      POSTGRES_DB: opencti
    volumes:
      - opencti-db-data:/var/lib/postgresql/data
    networks:
      - soc-net
    restart: unless-stopped

  opencti-redis:
    image: redis:7-alpine
    container_name: opencti-redis
    networks:
      - soc-net
    restart: unless-stopped

  opencti-es:
    image: bitnami/elasticsearch:8.10.0
    container_name: opencti-es
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    volumes:
      - opencti-es-data:/usr/share/elasticsearch/data
    networks:
      - soc-net
    restart: unless-stopped

  opencti:
    image: opencti/platform:latest
    container_name: opencti
    ports:
      - "3000:3000"
    environment:
      - NODE_OPTIONS=--max-old-space-size=2048
      - APP_BASE_URL=http://localhost:3000
      - APP_PORT=3000
      - APP_ADMIN_EMAIL=admin@opencti.local
      - APP_ADMIN_PASSWORD=Admin@123
      - POSTGRES_URL=postgres://opencti:opencti_password@opencti-db:5432/opencti
      - REDIS_URL=redis://opencti-redis:6379
      - ELASTICSEARCH_URL=http://opencti-es:9200
    depends_on:
      - opencti-db
      - opencti-redis
      - opencti-es
    networks:
      - soc-net
    restart: unless-stopped

volumes:
  misp-db-data:
  misp-app:
  opencti-db-data:
  opencti-es-data:

networks:
  soc-net:
    external: true
