# Kibana configuration
server.host: "0.0.0.0"
server.shutdownTimeout: "5s"
server.ssl.enabled: true
server.ssl.certificate: /usr/share/kibana/config/certs/certs/kibana.crt
server.ssl.key: /usr/share/kibana/config/certs/certs/kibana.key
server.publicBaseUrl: "https://localhost:5601"
elasticsearch.hosts: ["https://elasticsearch:9200"]
elasticsearch.ssl.certificateAuthorities: ["/usr/share/kibana/config/certs/ca/ca.crt"]
monitoring.ui.container.elasticsearch.enabled: true
xpack.fleet.agents.fleet_server.hosts: ["https://fleet-server:8220"]

# Task Manager tuning (fixes degraded status)
xpack.task_manager.max_workers: 20
xpack.task_manager.poll_interval: 3000
