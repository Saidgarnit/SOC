name: File Integrity Violation
type: any
index: .ds-wazuh-alerts-4.x-*,wazuh-alerts-4.x-*
ignore_unavailable: true
filter:
  - query_string:
        query: 'rule.groups:syscheck AND (rule.id:550 OR rule.id:554 OR rule.id:553 OR rule.id:552 OR rule.id:551)'
        analyze_wildcard: true
realert:
  minutes: 10
alert_subject: ":file_folder: [FIM] File change on %(agent.name)s -- %(rule.description)s"
alert_text_type: alert_text_only
alert_text: |
  :file_folder: FILE INTEGRITY VIOLATION
  ________________________________
  Rule       : %(rule.id)s -- %(rule.description)s
  Agent      : %(agent.name)s
  Level      : %(rule.level)s
  File       : %(syscheck.path)s
  Change     : %(syscheck.event)s
  Timestamp  : %(@timestamp)s
  ________________________________
  Kibana: http://localhost:5601

alert:
  - slack
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":file-folder:"
slack_msg_color: "danger"
