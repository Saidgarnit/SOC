name: Lateral Movement Detected
type: frequency
index: .ds-wazuh-alerts-4.x-*
ignore_unavailable: true

num_events: 5
timeframe:
  minutes: 5

query_key: agent.name

filter:
  - bool:
      should:
        - term:
            rule.groups: "authentication_success"
        - term:
            rule.groups: "sshd"
        - term:
            rule.groups: "win_lateral_movement"
        - term:
            rule.groups: "smb"
      minimum_should_match: 1
realert:
  minutes: 10
alert_subject: ":arrow_right: [Lateral Movement] %(agent.name)s detected"
alert_text_type: alert_text_only
alert_text: |
  :arrow_right: LATERAL MOVEMENT DETECTED
  ________________________________
  Rule       : %(rule.id)s -- %(rule.description)s
  Agent      : %(agent.name)s
  Level      : %(rule.level)s
  Timestamp  : %(@timestamp)s
  ________________________________
  Kibana: http://localhost:5601

alert:
  - slack
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":arrow_right:"
slack_msg_color: "danger"
