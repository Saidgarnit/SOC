name: Web Attack Detected
type: frequency
index: .ds-wazuh-alerts-4.x-*
ignore_unavailable: true
num_events: 3
timeframe:
  minutes: 5
query_key: data.srcip
filter:
  - bool:
      should:
        - term:
            rule.groups: "sqlinjection"
        - term:
            rule.groups: "web"
        - term:
            rule.id: "31164"
      minimum_should_match: 1
realert:
  minutes: 10
alert_subject: ":spider_web: [Web Attack] %(agent.name)s -- %(rule.description)s"
alert_text_type: alert_text_only
alert_text: |
  :spider_web: WEB ATTACK DETECTED
  ________________________________
  Rule       : %(rule.id)s -- %(rule.description)s
  Agent      : %(agent.name)s
  Level      : %(rule.level)s
  URL        : %(data.url)s
  Source IP  : %(data.srcip)s
  Timestamp  : %(@timestamp)s
  ________________________________
  Kibana: http://localhost:5601

alert:
  - slack
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":spider_web:"
slack_msg_color: "danger"
