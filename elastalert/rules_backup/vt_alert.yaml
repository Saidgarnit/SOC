# vt_alert.yaml — written by fix script
# vt_malicious is INTEGER in ES — use range, not string match
name: vt_malicious_enrichment_alert
type: any
index: soc-logs-enriched-*

filter:
  - range:
      vt_malicious:
        gte: 1

realert:
  minutes: 10

alert:
  - slack

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-VT-Alert"
slack_emoji_override: ":biohazard_sign:"
slack_msg_color: "warning"

alert_subject: ":biohazard_sign: [VirusTotal] Malicious IP %(src_ip)s detected"
alert_text_type: alert_text_only
alert_text: |
  :biohazard_sign: VIRUSTOTAL MALICIOUS IP
  ________________________________
  Source IP  : %(src_ip)s
  VT Score   : %(vt_malicious)s detections
  Severity   : %(vt_severity)s
  Timestamp  : %(@timestamp)s
  ________________________________
  Kibana: http://localhost:5601

