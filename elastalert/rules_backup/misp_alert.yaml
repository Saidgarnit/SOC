name: MISP-Threat-Intel-Match
type: any
index: soc-logs-enriched-*,alerts-soc-threats-*
ignore_unavailable: true
filter:
  - bool:
      should:
        - term:
            tags: "misp_threat_match"
        - term:
            alert.signature: "MISP_MALICIOUS_IP_MATCH"
        - exists:
            field: threat_intel_info
      minimum_should_match: 1
realert:
  minutes: 10
alert_subject: ":mag: MISP Threat Intel Detected"
alert_subject: ":female_detective: [MISP Intel] Threat match -- %(src_ip)s -> %(dest_ip)s"
alert_text_type: alert_text_only
alert_text: |
  :female_detective: MISP THREAT INTEL MATCH
  ________________________________
  Severity   : HIGH
  Timestamp  : %(@timestamp)s
  Source     : %(src_ip)s:%(src_port)s
  Destination: %(dest_ip)s:%(dest_port)s
  Protocol   : %(proto)s
  Signature  : %(threat_intel_info)s
  Action     : %(event_type)s
  :round_pushpin: Country: %(src_geoip.country_name)s
  :cityscape: City: %(src_geoip.city_name)s
  :office: ASN: %(src_geoip.as_org)s
  ________________________________
  Kibana: http://localhost:5601


  Severity   : HIGH
  Matches    : %(num_hits)s events
  Timestamp  : %(@timestamp)s
  Source     : %(src_ip)s:%(src_port)s
  Destination: %(dest_ip)s:%(dest_port)s
  Protocol   : %(proto)s
  Signature  : %(threat_intel_info)s
  Action     : %(event_type)s

  :round_pushpin: Country: %(src_geoip.country_name)s
  :cityscape: City: %(src_geoip.city_name)s
  :office: ASN: %(src_geoip.as_org)s
  ________________________________

  Kibana: http://localhost:5601
alert:
  - slack
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":mag:"
slack_msg_color: "danger"
