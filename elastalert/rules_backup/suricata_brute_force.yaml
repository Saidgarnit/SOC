name: Suricata SSH Brute Force Detected
type: frequency
index: soc-logs-enriched-*
ignore_unavailable: true
num_events: 8
timeframe:
  minutes: 5
query_key: src_ip
filter:
  - term:
      event_type.keyword: "alert"
  - query_string:
      query: 'alert.signature:*brute* OR alert.signature:*SSH* OR alert.category:*brute*'
      analyze_wildcard: true
realert:
  minutes: 10
alert_subject: ":hammer: [SSH Brute Force] %(src_ip)s -> %(dest_ip)s"
alert_text_type: alert_text_only
alert_text: |
  :hammer: SURICATA SSH BRUTE FORCE
  ________________________________
  Signature  : %(alert.signature)s
  Source     : %(src_ip)s:%(src_port)s
  Destination: %(dest_ip)s:%(dest_port)s
  Protocol   : %(proto)s
  Timestamp  : %(@timestamp)s
  :round_pushpin: Country: %(src_geoip.country_name)s
  ________________________________
  Kibana: http://localhost:5601

alert:
  - slack
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":key:"
slack_msg_color: "danger"
