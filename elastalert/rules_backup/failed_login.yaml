name: Failed Login Attempt
type: any
index: soc-logs-enriched-*
ignore_unavailable: true

filter:
- query:
    query_string:
      query: "status: failed"

alert_text_type: alert_text_only
use_elastalert_template: false

alert_text: |
  🎯 MITRE: Initial Access (TA0001)
  🔧 Technique: Valid Accounts (T1078)
  ⚠️ Severity: HIGH
  🌍 Source IP: {0}
  📍 Country: {1}
  🏙️ City: {2}

alert_text_args:
- src_ip
- geoip.country_name
- geoip.city_name

alert:
- email
- slack

slack_webhook_url: YOUR_SLACK_WEBHOOK_URLsRIpNUJkESdCdlfBlTPd4T4
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":rotating_light:"
slack_msg_color: danger

email:
- garnitsaid01@gmail.com
smtp_host: smtp.gmail.com
smtp_port: 587
smtp_ssl: false
smtp_auth_file: /opt/elastalert/smtp_auth.yaml
from_addr: garnitsaid01@gmail.com
email_subject: "ElastAlert: Failed Login Attempt"
