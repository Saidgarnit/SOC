name: Failed Login Attempt
type: frequency
index: .ds-wazuh-alerts-4.x-*,.ds-wazuh-alerts-4.x-*
ignore_unavailable: true

num_events: 5
timeframe:
  minutes: 5

query_key: data.srcip

filter:
  - bool:
      should:
        - term:
            rule.groups: "authentication_failed"
        - term:
            rule.groups: "sshd"
      minimum_should_match: 1
realert:
  minutes: 10
alert_subject: ":lock: [Failed Login] %(agent.name)s -- %(rule.description)s"
alert_text_type: alert_text_only
alert_text: |
  :lock: FAILED LOGIN ATTEMPT
  ________________________________
  Rule       : %(rule.id)s -- %(rule.description)s
  Agent      : %(agent.name)s
  Level      : %(rule.level)s
  Timestamp  : %(@timestamp)s
  User       : %(data.dstuser)s
  Source IP  : %(data.srcip)s
  ________________________________
  Kibana: http://localhost:5601

alert:
  - slack
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":lock:"
slack_msg_color: "warning"
