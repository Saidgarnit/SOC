name: Webshell Indicator - Process Spawned from Web Server
type: any
index: .ds-wazuh-alerts-4.x-*
ignore_unavailable: true
filter:
  - bool:
      should:
        - terms:
            rule.id:
              - "31166"
              - "31167"
              - "5710"
              - "87105"
        - query_string:
            query: "rule.description:(*webshell* OR *reverse*shell* OR *shell*upload*)"
            analyze_wildcard: true
      minimum_should_match: 1
realert:
  minutes: 10
alert_subject: ":biohazard_sign: [Webshell] %(agent.name)s -- %(rule.description)s"
alert_text_type: alert_text_only
alert_text: |
  :biohazard_sign: WEBSHELL INDICATOR DETECTED
  ________________________________
  Rule       : %(rule.id)s -- %(rule.description)s
  Agent      : %(agent.name)s
  Level      : %(rule.level)s
  File       : %(syscheck.path)s
  Timestamp  : %(@timestamp)s
  ________________________________
  Kibana: http://localhost:5601

alert:
  - slack
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":spider:"
slack_msg_color: "danger"
