# high_risk.yaml — final corrected version
name: high_risk_lateral_movement
type: any
index: .ds-wazuh-alerts-4.x-*

filter:
  - terms:
      rule.groups:
        - authentication_failed
        - lateral_movement
        - rootcheck
        - syscheck

realert:
  minutes: 10

alert:
  - slack
  - email

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":rotating_light:"
slack_msg_color: "danger"

alert_subject: ":rotating_light: [HIGH RISK] %(agent.name)s -- %(rule.description)s"
alert_text_type: alert_text_only
alert_text: |
  :rotating_light: HIGH RISK ALERT
  ________________________________
  Rule       : %(rule.id)s -- %(rule.description)s
  Agent      : %(agent.name)s
  Level      : %(rule.level)s
  Timestamp  : %(@timestamp)s
  ________________________________
  Kibana: http://localhost:5601


# email as list — avoids SMTP bare-string rejection
email:
  - garnitsaid01@gmail.com

smtp_host: "smtp.gmail.com"
smtp_port: 587
smtp_ssl: false
smtp_auth_file: /opt/elastalert/smtp_auth.yaml
from_addr: "garnitsaid01@gmail.com"
email_subject: "SOC HIGH RISK -- %(rule.description)s"
