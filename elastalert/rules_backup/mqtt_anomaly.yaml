name: MQTT Anomaly Detected
type: frequency
index: soc-logs-enriched-*
ignore_unavailable: true
num_events: 10
timeframe:
  minutes: 3
query_key: src_ip
filter:
  - bool:
      should:
        - term:
            dest_port: 1883
        - term:
            dest_port: 8883
        - query_string:
            query: "alert.signature:(*MQTT* OR *mqtt*)"
            analyze_wildcard: true
      minimum_should_match: 1
  - bool:
      must_not:
        - terms:
            src_ip:
              - "172.18.0.6"
              - "172.18.0.9"
              - "172.18.0.19"
realert:
  minutes: 10
alert_subject: ":electric_plug: [MQTT] Anomaly -- %(alert.signature)s"
alert_text_type: alert_text_only
alert_text: |
  :electric_plug: MQTT ANOMALY DETECTED
  ________________________________
  Signature  : %(alert.signature)s
  Source     : %(src_ip)s:%(src_port)s
  Destination: %(dest_ip)s:%(dest_port)s
  Timestamp  : %(@timestamp)s
  ________________________________
  Kibana: http://localhost:5601

alert:
  - slack
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":electric_plug:"
slack_msg_color: "warning"
