name: Privilege Escalation Detected
type: any
index: .ds-wazuh-alerts-4.x-*,.ds-wazuh-alerts-4.x-*
ignore_unavailable: true
filter:
  - query_string:
        query: 'rule.groups:sudo OR rule.groups:privilege_escalation OR rule.id:5500 OR rule.id:5501 OR rule.id:5502'
        analyze_wildcard: true
realert:
  minutes: 10
alert_subject: ":arrow_double_up: [PrivEsc] %(agent.name)s -- %(rule.description)s"
alert_text_type: alert_text_only
alert_text: |
  :arrow_double_up: PRIVILEGE ESCALATION DETECTED
  ________________________________
  Rule       : %(rule.id)s -- %(rule.description)s
  Agent      : %(agent.name)s
  Level      : %(rule.level)s
  Timestamp  : %(@timestamp)s
  ________________________________
  Kibana: http://localhost:5601

alert:
  - slack
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":crown:"
slack_msg_color: "danger"
