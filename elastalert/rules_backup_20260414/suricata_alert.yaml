name: Suricata Alert Detected
type: any
index: soc-logs-enriched-*,alerts-soc-threats-*
ignore_unavailable: true

filter:
- query:
    query_string:
      query: "event.module: suricata"




mitre_technique_id: "T1046"
mitre_technique: "Network Service Discovery"
mitre_tactic: "Discovery"
mitre_tactic_id: "TA0007"

alert_text_type: alert_text_jinja
alert_text: |
  🎯 MITRE: Discovery (TA0007)
  🔧 Technique: Network Service Discovery (T1046)
  ⚠️  Severity: HIGH
  🌍 Source IP: {{ src_ip }}
realert:
  minutes: 30

alert:
- slack
- email

slack_webhook_url: YOUR_SLACK_WEBHOOK_URL
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":rotating_light:"
slack_msg_color: danger

email:
- garnitsaid01@gmail.com
smtp_host: smtp.gmail.com
smtp_port: 587
smtp_ssl: false
smtp_auth_file: /opt/elastalert/smtp_auth.yaml
from_addr: garnitsaid01@gmail.com
email_subject: "Suricata Alert - {1} -> {2}"
