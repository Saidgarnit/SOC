name: YARA Critical Malware Detection
type: any
index: soc-logs-enriched-*
ignore_unavailable: true
filter:
- term:
    event_type: "yara_match"
alert_text_type: alert_text_jinja
jinja_root_name: alert
alert_text: |
  YARA Malware Detected!
  Rule: {{ alert.rule_name | default('N/A') }}
  File: {{ alert.file_name | default('N/A') }}
  Severity: {{ alert.severity | default('N/A') }}
  MITRE: {{ alert.mitre_technique | default('N/A') }}
  Description: {{ alert.description | default('N/A') }}
alert_missing_value: "N/A"
realert:
  minutes: 60
alert:
- email
- slack
slack_webhook_url: YOUR_SLACK_WEBHOOK_URL
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":rotating_light:"
slack_msg_color: danger
email:
- garnitsaid01@gmail.com
smtp_host: smtp.gmail.com
smtp_port: 587
smtp_ssl: false
smtp_auth_file: /opt/elastalert/smtp_auth.yaml
from_addr: garnitsaid01@gmail.com
email_subject: "SOC Alert - YARA Malware Detection"
