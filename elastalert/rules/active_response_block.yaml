name: Active Response Block Alert
type: any
index: soc-logs-enriched-*

filter:
- query:
    query_string:
      query: rule.groups:active_response AND rule.id:(601 OR 603 OR 605)

alert:
- slack
- hivealerter

slack_webhook_url: https://hooks.slack.com/services/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
slack_username_override: SOC Alerts
slack_emoji_override: ':shield:'
slack_msg_color: good

alert_text_type: alert_text_only
alert_text: |
  🛡️ ACTIVE RESPONSE TRIGGERED — HOST BLOCKED

  Action     : IP BLOCKED via firewall-drop
  Blocked IP : {0}
  Host       : {1}
  Agent ID   : {2}
  Rule ID    : {3}
  Rule       : {4}
  Timestamp  : {5}
  Kibana     : http://localhost:5601

alert_text_args:
- data.srcip
- agent.name
- agent.id
- rule.id
- rule.description
- '@timestamp'

realert:
  minutes: 5


hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "qaU5mFxE64fL+5yihYHoqA68J5yeJoEg"
hive_alert_config:
  title: "{match[rule.description]}"
  type: "external"
  source: "elastalert"
  description: "Detected by ElastAlert rule\n\nIndex: {rule[index]}"
  severity: 2
  tags: ["soc-alert", "elastalert"]
