name: Web Attack Detected
type: frequency
index: soc-logs-enriched-*
ignore_unavailable: true
num_events: 3
timeframe:
  minutes: 2
query_key: src_ip
filter:
  - term:
      event_type.keyword: "alert"
  - term:
      type.keyword: "SuricataIDPS"
  - query_string:
      query: 'alert.signature:*SQL* OR alert.signature:*XSS* OR alert.signature:*injection* OR alert.signature:*traversal* OR alert.signature:*scanner*'
      analyze_wildcard: true
realert:
  minutes: 10
alert_subject: "[WEB ATTACK] {0} -> {1}"
alert_subject_args:
  - alert.signature
  - dest_ip
alert_text_type: alert_text_jinja
alert_text: |
  WEB ATTACK DETECTED
  Signature  : {{ alert.signature | default('N/A') }}
  Matches    : {{ num_hits }} events in 2 min
  Timestamp  : {{ timestamp }}
  Attacker   : {{ src_ip | default('N/A') }}:{{ src_port | default('N/A') }}
  Target     : {{ dest_ip | default('N/A') }}:{{ dest_port | default('N/A') }}
  MITRE      : T1190 - Exploit Public-Facing Application
  Kibana     : http://localhost:5601
alert:
  - email
  - slack
email:
  - garnitsaid01@gmail.com
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":globe_with_meridians:"
slack_msg_color: "danger"
