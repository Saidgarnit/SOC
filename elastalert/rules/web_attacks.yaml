alert:
- slack
alert_text: "\U0001F310 Web Attack — {0} → {1}\n   WEB APPLICATION ATTACK\n\n   Source\
  \ IP  : {0}\n   Host       : {1}\n   Rule       : {2}\n   Rule ID    : {3}\n   Level\
  \      : {4}\n   Timestamp  : {5}\n   MITRE      : {6}\n   Kibana     : http://localhost:5601"
alert_text_args:
- data.srcip
- agent.name
- rule.description
- rule.id
- rule.level
- '@timestamp'
- rule.mitre.id
alert_text_type: alert_text_only
filter:
- query:
    query_string:
      query: rule.groups:"web" AND rule.groups:"attack"
index: .ds-wazuh-alerts-4.x-*
name: Web Attack Detected
realert:
  minutes: 5
slack_emoji_override: ':globe_with_meridians:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
type: any
