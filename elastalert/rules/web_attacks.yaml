name: "Web Attacks (Wazuh)"
type: any
index: wazuh-alerts-*

filter:
- query:
    bool:
      must:
      - match:
          rule.groups: web

query_key: agent.name
realert:
  minutes: 5

alert: slack
slack_webhook_url: "https://hooks.slack.com/services/YOUR_REAL_WEBHOOK"
slack_username_override: "SOC Alerts"
slack_icon_emoji: ":spider_web:"
slack_msg_color: danger
alert_text_type: alert_text_only
alert_text: |
  *Web Attack Detected*
  *Severity:* HIGH
  *Agent/Target:* {agent.name}
  *Source IP:* {data.srcip}
  *Attack Method:* {rule.description}
  *Timestamp:* {timestamp}
  *Dashboard:* http://localhost:5601/app/discover

