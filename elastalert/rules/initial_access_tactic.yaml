name: "Initial Access Detected (TA0001)"
type: any
query_key: agent.name
index: soc-logs-enriched-*
filter:
  - query:
      bool:
        minimum_should_match: 1
        should:
          - match_phrase:
              rule.groups: "web"
          - match_phrase:
              rule.groups: "appsec"
          - match_phrase:
              rule.groups: "attack"
alert:
  - slack
  - hivealerter
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_msg_color: "danger"
alert_text: |
  :door: *INITIAL ACCESS ATTEMPT* -- TA0001
  Rule ID: {rule.id}
  Description: {rule.description}
  Agent: {agent.name}
  Groups: {rule.groups}
  MITRE: T1190 Exploit Public-Facing App
alert_text_type: alert_text_only
realert:
  minutes: 10


hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "qaU5mFxE64fL+5yihYHoqA68J5yeJoEg"
hive_alert_config:
  title: "{match[rule.description]}"
  type: "external"
  source: "elastalert"
  description: "Detected by ElastAlert rule\n\nIndex: {rule[index]}"
  severity: 2
  tags: ["soc-alert", "elastalert"]
