alert: slack
alert_text: 'FIM Alert: {0} - {1} - {2}'
alert_text_args:
  - agent.name
  - syscheck.path
  - syscheck.event
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match:
          rule.groups: syscheck
      must_not:
      - match:
          syscheck.path: /tmp
      - match:
          syscheck.path: /proc
      - match:
          syscheck.path: /run
index: .ds-wazuh-alerts-4.x-*
name: "Wazuh — File Integrity Alert"
num_events: 1
realert:
  minutes: 30
slack_icon_emoji: ':open_file_folder:'
slack_msg_color: warning
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
timeframe:
  minutes: 5
type: frequency
