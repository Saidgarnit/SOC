name: File Integrity Violation
type: any
index: wazuh-alerts-4.x-*,.ds-wazuh-alerts-4.x-*
ignore_unavailable: true
filter:
  - query:
      query_string:
        query: 'rule.groups:syscheck AND (rule.id:550 OR rule.id:554 OR rule.id:553 OR rule.id:552 OR rule.id:551)'
        analyze_wildcard: true
realert:
  minutes: 10
alert_subject: "📁 [FIM] File changed on {0}"
alert_subject_args:
  - agent.name
alert_text_type: alert_text_jinja
alert_text: |
  📁 FILE INTEGRITY VIOLATION
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Host       : {{ agent.name | default('N/A') }}
  Rule       : {{ rule.description | default('N/A') }}
  Rule ID    : {{ rule.id | default('N/A') }}
  Timestamp  : {{ timestamp }}
  MITRE      : T1565 - Data Manipulation
  Kibana     : http://localhost:5601
alert:
  - email
  - slack
email:
  - garnitsaid01@gmail.com
slack_webhook_url: "YOUR_SLACK_WEBHOOK_URLsRIpNUJkESdCdlfBlTPd4T4"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":file_folder:"
slack_msg_color: "warning"
