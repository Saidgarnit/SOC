alert: slack
alert_text: 'FIM Alert: {agent.name} - {syscheck.path} - {syscheck.event}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match:
          rule.groups: syscheck
index: wazuh-alerts-*
name: "Wazuh \u2014 File Integrity Alert"
query_key: agent.name
realert:
  minutes: 5
slack_icon_emoji: ':file_folder:'
slack_msg_color: warning
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/YOUR_REAL_WEBHOOK
type: any
