name: "üìÇ Wazuh ‚Äî File Integrity Alert"
type: frequency
index: .ds-wazuh-alerts-4.x-*
num_events: 1
timeframe:
  minutes: 5
realert:
  minutes: 30
query_key: agent.name
filter:
- query:
    bool:
      must_not:
      - wildcard:
          data.syscheck.path: "*/hsperfdata_*"
- query:
    bool:
      must:
      - match:
          rule.groups: syscheck
      must_not:
      - match:
          syscheck.path: /tmp
      - match:
          syscheck.path: /proc
      - match:
          syscheck.path: /run

alert:
- slack
alert_text_type: alert_text_only
alert_text: "\nüìÇ *Wazuh ‚Äî File Integrity Alert*\n‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ\nTime: {0}\nHost: {1} ({2})\nLevel: {3} | Rule: {4}\nDescription: {5}\n‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ\nFile Change:\n  Path: {6}\n  Event: {7}\n  Owner: {8}\n  Permissions: {9}\n  Size: {10} bytes\n  MD5: {11}\n  SHA256: {12}\n‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ‚îÅ\nKibana: http://localhost:5601\n"
alert_text_args:
- '@timestamp'
- agent.name
- agent.ip
- rule.level
- rule.id
- rule.description
- syscheck.path
- syscheck.event
- syscheck.uname_after
- syscheck.perm_after
- syscheck.size_after
- syscheck.md5_after
- syscheck.sha256_after

slack_webhook_url: "${SLACK_WEBHOOK_URL}"
slack_username_override: SOC Alerts
slack_icon_emoji: ':open_file_folder:'
slack_msg_color: warning
