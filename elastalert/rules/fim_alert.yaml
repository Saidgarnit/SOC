name: File Integrity Alert
type: any
index: .ds-wazuh-alerts-4.x-*
filter:
- query:
    query_string:
      query: 'rule.groups:"syscheck"'
alert:
- slack
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC Alerts"
slack_emoji_override: ":file_folder:"
slack_msg_color: "warning"
alert_text_type: alert_text_only
alert_text: |
  📁 File Modified — {0}
     FILE INTEGRITY MONITORING

     Host       : {1}
     Path       : {0}
     Event      : {2}
     Owner      : {3}
     SHA256     : {4}
     Rule       : {5}
     Rule ID    : {6}
     Level      : {7}
     Timestamp  : {8}
     Kibana     : http://localhost:5601
alert_text_args:
- syscheck.path
- agent.name
- syscheck.event
- syscheck.uname_after
- syscheck.sha256_after
- rule.description
- rule.id
- rule.level
- "@timestamp"
realert:
  minutes: 5
