name: File Integrity Alert
type: any
query_key: agent.name
index: soc-logs-enriched-*
filter:
- query:
    query_string:
      query: 'rule.groups:"syscheck"'
alert:
- slack
- hivealerter
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC Alerts"
slack_emoji_override: ":file_folder:"
slack_msg_color: "warning"
alert_text_type: alert_text_only
alert_text: |
  📁 File Modified — {0}
     FILE INTEGRITY MONITORING

     Host       : {1}
     Path       : {0}
     Event      : {2}
     Owner      : {3}
     SHA256     : {4}
     Rule       : {5}
     Rule ID    : {6}
     Level      : {7}
     Timestamp  : {8}
     Kibana     : http://localhost:5601
alert_text_args:
- syscheck.path
- agent.name
- syscheck.event
- syscheck.uname_after
- syscheck.sha256_after
- rule.description
- rule.id
- rule.level
- "@timestamp"
realert:
  minutes: 5


hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "qaU5mFxE64fL+5yihYHoqA68J5yeJoEg"
hive_alert_config:
  title: "{match[rule.description]}"
  type: "external"
  source: "elastalert"
  description: "Detected by ElastAlert rule\n\nIndex: {rule[index]}"
  severity: 2
  tags: ["soc-alert", "elastalert"]
