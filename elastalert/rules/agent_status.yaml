alert: slack
alert_text: 'Agent Status: {agent.name} - {rule.description}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      minimum_should_match: 1
      should:
      - term:
          rule.id: '506'
      - term:
          rule.id: '501'
index: wazuh-alerts-*
name: "Wazuh \u2014 Agent Status Change"
query_key: agent.name
realert:
  minutes: 15
slack_icon_emoji: ':robot_face:'
slack_msg_color: warning
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/YOUR_REAL_WEBHOOK
type: any
