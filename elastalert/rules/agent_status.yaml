name: "Agent Status Change — Wazuh"
type: any
index: soc-logs-enriched-*

filter:
  - query:
      query_string:
        query: 'rule.id:503 OR rule.id:504 OR rule.id:505'

alert:
  - slack
  - hivealerter

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_msg_color: warning

alert_text: "Agent Status Change\nAgent: {0}\nStatus: {1}"
alert_text_args:
  - agent.name
  - rule.description

realert:
  minutes: 120

alert_subject: "SOC - Agent Status: {0}"
alert_subject_args:
  - agent.name


hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "qaU5mFxE64fL+5yihYHoqA68J5yeJoEg"
hive_alert_config:
  title: "{match[rule.description]}"
  type: "external"
  source: "elastalert"
  description: "Detected by ElastAlert rule\n\nIndex: {rule[index]}"
  severity: 2
  tags: ["soc-alert", "elastalert"]
