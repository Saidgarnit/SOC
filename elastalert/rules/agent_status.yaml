alert:
- slack
alert_text: "\U0001F534 Agent Disconnected — {0}\n   AGENT STATUS\n\n   Agent Name\
  \ : {0}\n   Agent ID   : {1}\n   Rule       : {2}\n   Rule ID    : {3}\n   Timestamp\
  \  : {4}\n   Kibana     : http://localhost:5601"
alert_text_args:
- agent.name
- agent.id
- rule.description
- rule.id
- '@timestamp'
alert_text_type: alert_text_only
filter:
- query:
    query_string:
      query: rule.groups:"agent" AND (rule.description:*disconnected* OR rule.description:*stopped*)
index: .ds-wazuh-alerts-4.x-*
name: Agent Disconnected
realert:
  minutes: 30
slack_emoji_override: ':red_circle:'
slack_msg_color: warning
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
type: any
