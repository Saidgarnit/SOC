slack_username_override: SOC Alerts
slack_emoji_override: ':warning:'
slack_msg_color: danger
alert_text_type: alert_text_only
alert_text: "\U0001F6A8 *SOC ALERT \u2014 DNS EXFILTRATION DETECTED*\n\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n*Detection:*\
  \ {0}\n*Target/Agent:* `{1}`\n*Rule ID:* {2} | *Level:* {3}\n*MITRE:* {4} \u2014\
  \ {5}\n*Source IP:* `{6}`\n*Detected at:* {7}\n\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
