name: DNS Exfiltration Detected
type: frequency
index: soc-logs-enriched-*
num_events: 20
timeframe:
  minutes: 5
filter:
  - query:
      query_string:
        query: 'rule.groups:"dns" AND rule.level:[3 TO *]'
alert:
  - slack
  - hivealerter
slack_webhook_url: https://hooks.slack.com/services/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
slack_username_override: SOC Alerts
slack_emoji_override: ':warning:'
slack_msg_color: danger
alert_text_type: alert_text_only
alert_text: |
  🔴 DNS Exfiltration — {0}
     DNS TUNNELING

     Source IP  : {0}
     Host       : {1}
     Rule       : {2}
     Count      : 20+ queries in 5 min
     Timestamp  : {3}
     Kibana     : http://localhost:5601
alert_text_args:
  - data.srcip
  - agent.name
  - rule.description
  - '@timestamp'
realert:
  minutes: 10


hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "qaU5mFxE64fL+5yihYHoqA68J5yeJoEg"
hive_alert_config:
  title: "{match[rule.description]}"
  type: "external"
  source: "elastalert"
  description: "Detected by ElastAlert rule\n\nIndex: {rule[index]}"
  severity: 2
  tags: ["soc-alert", "elastalert"]
