alert_text_args:
- rule.description
- agent.name
- rule.id
- rule.level
- rule.mitre.tactic[0]
- rule.mitre.technique[0]
- data.srcip
- '@timestamp'
realert:
  minutes: 10
hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: qaU5mFxE64fL+5yihYHoqA68J5yeJoEg
hive_alert_config:
  title: '{match[rule][description]}'
  type: external
  source: elastalert
  description: 'Detected by ElastAlert rule


    Index: {rule[index]}'
  severity: 2
  tags:
  - soc-alert
  - elastalert
alert_missing_value: N/A
