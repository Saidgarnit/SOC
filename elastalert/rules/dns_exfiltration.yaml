alert: slack
alert_text: 'DNS Exfil: {alert.signature} from {src_ip} to {dest_ip}:{dest_port}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - bool:
          should:
          - match_phrase:
              alert.signature: DNS Exfil
          - match_phrase:
              alert.signature: DNS Tunneling
index: soc-logs-enriched-*
name: "Suricata IDS \u2014 DNS Exfiltration"
query_key: src_ip
realert:
  minutes: 30
slack_icon_emoji: ':satellite_antenna:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/YOUR_REAL_WEBHOOK
type: any
