name: DNS Exfiltration or Tunneling Detected
type: frequency
index: soc-logs-enriched-*
ignore_unavailable: true
num_events: 10
timeframe:
  minutes: 2
filter:
  - term:
      event_type.keyword: "dns"
realert:
  minutes: 60
alert_subject: "[HIGH] DNS Tunneling Detected - {0} queries"
alert_subject_args:
  - num_hits
alert_text_type: alert_text_jinja
alert_text: |
  DNS EXFILTRATION / TUNNELING DETECTED
  Query Count: {{ num_hits }} in 2 minutes
  MITRE      : T1071.004 - DNS C2
  Kibana     : http://localhost:5601
alert:
  - slack
slack_webhook_url: "https://hooks.slack.com/services/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"
