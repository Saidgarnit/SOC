name: "🛸 DNS Exfiltration — Data Exfil"
type: any
index: suricata-alerts-*
realert:
  hours: 1
query_key: src_ip
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - bool:
          should:
          - match_phrase:
              alert.signature: "DNS Exfil"
          - match_phrase:
              alert.signature: "DNS Tunneling"
          minimum_should_match: 1

alert:
- slack
alert_text_type: alert_text_only
alert_text: |
  🛸 *DNS Exfiltration Detected*
  `SURICATA / Data Exfiltration`

  🕐 `{0}`
  📋 Rule: {1}  Severity: {2}

  🔴 Source     {4} : {5}
  🔵 DNS Server {6} : {7}
  📡 {8}  via  {9}

  🔗 T1048 — Exfiltration Over Alt Protocol
  📊 http://localhost:5601
alert_text_args:
- "@timestamp"
- alert.signature
- alert.severity
- alert.category
- src_ip
- src_port
- dest_ip
- dest_port
- proto
- in_iface

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC Alerts"
slack_icon_emoji: ":satellite_antenna:"
slack_msg_color: danger
