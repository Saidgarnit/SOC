alert:
- slack
alert_text: "\U0001F534 DNS Exfiltration — {0}\n   DNS TUNNELING\n\n   Source IP \
  \ : {0}\n   Host       : {1}\n   Rule       : {2}\n   Count      : 50+ queries in\
  \ 5 min\n   Timestamp  : {3}\n   Kibana     : http://localhost:5601"
alert_text_args:
- data.srcip
- agent.name
- rule.description
- '@timestamp'
alert_text_type: alert_text_only
filter:
- query:
    query_string:
      query: rule.groups:"dns" AND rule.level:[8 TO *]
index: .ds-wazuh-alerts-4.x-*
name: DNS Exfiltration Detected
num_events: 50
realert:
  minutes: 15
slack_emoji_override: ':warning:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
timeframe:
  minutes: 5
type: frequency
