name: "рџ›ё Suricata вЂ” DNS Exfiltration"
type: any
index: soc-logs-enriched*
realert:
  minutes: 30
query_key: src_ip
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - bool:
          should:
          - match_phrase:
              alert.signature: DNS Exfil
          - match_phrase:
              alert.signature: DNS Tunneling
          minimum_should_match: 1

alert:
- slack
alert_text_type: alert_text_only
alert_text: "\nрџ›ё *Suricata вЂ” DNS Exfiltration*\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nTime: {0}\nSignature: {1}\nSeverity: {2} | Category: {3}\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nNetwork:\n  Source: {4}:{5}\n  Destination: {6}:{7}\n  Proto: {8} | Interface: {9}\n  Community ID: {10}\n  Action: {11}\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nMITRE: T1048 вЂ” Exfiltration Over Alternative Protocol\nKibana: http://localhost:5601\n"
alert_text_args:
- '@timestamp'
- alert.signature
- alert.severity
- alert.category
- src_ip
- src_port
- dest_ip
- dest_port
- proto
- in_iface
- community_id
- alert.action

slack_webhook_url: "${SLACK_WEBHOOK_URL}"
slack_username_override: SOC Alerts
slack_icon_emoji: ':satellite_antenna:'
slack_msg_color: danger
