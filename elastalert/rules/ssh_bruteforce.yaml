alert:
- slack
alert_text: "\U0001F534 SSH Brute Force — {0} → {1}\n   AUTHENTICATION FAILURE\n\n\
  \   Source IP  : {0}\n   Target User: {2}\n   Host       : {1}\n   Rule       :\
  \ {3}\n   Rule ID    : {4}\n   Level      : {5}\n   Timestamp  : {6}\n   MITRE \
  \     : {7}\n   Kibana     : http://localhost:5601"
alert_text_args:
- data.srcip
- agent.name
- data.dstuser
- rule.description
- rule.id
- rule.level
- '@timestamp'
- rule.mitre.id
alert_text_type: alert_text_only
filter:
- query:
    query_string:
      query: rule.groups:"authentication_failed" AND rule.groups:"sshd"
index: .ds-wazuh-alerts-4.x-*
name: SSH Brute Force Attack
num_events: 5
realert:
  minutes: 10
slack_emoji_override: ':warning:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
timeframe:
  minutes: 5
type: frequency
