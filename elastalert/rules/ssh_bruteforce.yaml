name: SSH Brute Force Detection
type: frequency
query_key: data.srcip
index: wazuh-alerts-*

num_events: 5
timeframe:
  minutes: 15

filter:
  - query:
      query_string:
        query: 'rule.id:5763 OR rule.groups:authentication_failed'

alert:
  - slack

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_msg_color: danger
alert_text: "🚨 SSH Brute Force Detected!\nSource IP: {0}\nTarget: {1}\nAttempts: {2}\nRule: {3}"
alert_text_args:
  - data.srcip
  - agent.name
  - num_matches
  - rule.description


alert_subject: "SOC ALERT - SSH Brute Force: {0}"
alert_subject_args:
  - data.srcip
realert:
  minutes: 15
