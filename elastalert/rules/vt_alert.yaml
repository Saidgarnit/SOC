name: "рҹҰ  VirusTotal вҖ” Malicious Hash"
type: any
index: .ds-wazuh-alerts-4.x-*
realert:
  minutes: 60
query_key: agent.name
filter:
- query:
    bool:
      must:
      - term:
          vt_checked: true
      - range:
          vt_malicious:
            gt: 0

alert:
- slack
alert_text_type: alert_text_only
alert_text: "\nрҹҰ  *VirusTotal вҖ” Malicious Hash*\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nTime: {0}\nHost: {1} ({2})\nLevel: {3} | Rule: {4}\nDescription: {5}\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nVirusTotal Results:\n  Malicious Detections: {6}\n  Risk Score: {7}\n  Severity: {8}\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nFull Log: {9}\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nKibana: http://localhost:5601\n"
alert_text_args:
- '@timestamp'
- agent.name
- agent.ip
- rule.level
- rule.id
- rule.description
- vt_malicious
- vt_risk_score
- vt_severity
- full_log

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: SOC Alerts
slack_icon_emoji: ':biohazard_sign:'
slack_msg_color: danger
