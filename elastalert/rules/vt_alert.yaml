alert: slack
alert_text: 'VT Alert: {agent.name} - {syscheck.path} - {vt_malicious} engines flagged'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - term:
          vt_checked: true
      - range:
          vt_malicious:
            gt: 0
index: wazuh-alerts-*
name: "VirusTotal \u2014 Malicious Hash"
query_key: agent.name
realert:
  minutes: 60
slack_icon_emoji: ':biohazard_sign:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/YOUR_REAL_WEBHOOK
type: any
