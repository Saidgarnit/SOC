alert:
- slack
alert_text: "☣️ MALICIOUS FILE — {0}\n   VIRUSTOTAL MATCH\n\n   Host       : {0}\n\
  \   Path       : {1}\n   SHA256     : {2}\n   VT Score   : {3}\n   Rule       :\
  \ {4}\n   Rule ID    : {5}\n   Timestamp  : {6}\n   Kibana     : http://localhost:5601"
alert_text_args:
- agent.name
- syscheck.path
- syscheck.sha256_after
- vt_risk_score
- rule.description
- rule.id
- '@timestamp'
alert_text_type: alert_text_only
filter:
- query:
    query_string:
      query: vt_checked:true AND vt_severity:malicious
index: wazuh-alerts-*
name: VirusTotal Malicious File Detected
realert:
  minutes: 30
slack_emoji_override: ':biohazard_sign:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
type: any
