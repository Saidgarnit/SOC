name: C2 Beacon Activity Detected
type: frequency
index: soc-logs-enriched-*
ignore_unavailable: true

# C2 beacons are periodic — many connections to same external dest
num_events: 15
timeframe:
  minutes: 10

query_key: dest_ip

filter:
  - bool:
      must:
        - term:
            event_type.keyword: "flow"
      must_not:
        - terms:
            src_ip:
              - "172.18.0.6"
              - "172.18.0.9"
              - "172.18.0.19"
        # Exclude common internal/infra ports
        - terms:
            dest_port:
              - 80
              - 443
              - 53
              - 123

realert:
  minutes: 30

alert_subject: "🔦 [HIGH] C2 Beacon — {0} flows to {1}"
alert_subject_args:
  - num_hits
  - dest_ip

alert_text_type: alert_text_jinja
alert_text: |
  🔦 POSSIBLE C2 BEACON DETECTED
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Suspect C2 : {{ dest_ip | default('N/A') }}:{{ dest_port | default('N/A') }}
  Beaconing  : {{ num_hits }} periodic flows in 10 min
  Timestamp  : {{ timestamp }}
  Source IP  : {{ src_ip | default('N/A') }}
  Protocol   : {{ proto | default('N/A') }}
  GeoIP Dest : {{ dest_geoip.country_name | default('Internal/Private') }}
  GeoIP Src  : {{ src_geoip.country_name | default('Internal/Private') }}
  MITRE      : T1071 - Application Layer Protocol (C2)
               T1132 - Data Encoding
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Kibana: http://localhost:5601

alert:
  - email
  - slack

email:
  - garnitsaid01@gmail.com

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":flashlight:"
slack_msg_color: "danger"
