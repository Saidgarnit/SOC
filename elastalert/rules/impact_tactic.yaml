name: "Impact Detected (TA0040)"
type: any
query_key: agent.name
index: soc-logs-enriched-*
filter:
  - query:
      bool:
        minimum_should_match: 1
        should:
          - range:
              rule.level:
                gte: 12
          - match_phrase:
              rule.groups: "service_availability"
          - terms:
              rule.id: ["533", "535", "2932"]
alert:
  - slack
  - hivealerter
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_msg_color: "danger"
alert_text: |
  :boom: *IMPACT DETECTED* -- TA0040
  Rule ID: {rule.id}
  Level: {rule.level}
  Description: {rule.description}
  Agent: {agent.name}
  MITRE: T1489 Service Stop / T1499 DoS
alert_text_type: alert_text_only
realert:
  minutes: 10


hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "qaU5mFxE64fL+5yihYHoqA68J5yeJoEg"
hive_alert_config:
  title: "{match[rule.description]}"
  type: "external"
  source: "elastalert"
  description: "Detected by ElastAlert rule\n\nIndex: {rule[index]}"
  severity: 2
  tags: ["soc-alert", "elastalert"]
