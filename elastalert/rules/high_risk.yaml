alert: slack
alert_text: 'HIGH RISK: {agent.name} - Level {rule.level} - {rule.description}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - range:
          rule.level:
            gte: 13
index: wazuh-alerts-*
name: "Wazuh \u2014 High Risk Event"
query_key: agent.name
realert:
  minutes: 5
slack_icon_emoji: ':rotating_light:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/YOUR_REAL_WEBHOOK
type: any
