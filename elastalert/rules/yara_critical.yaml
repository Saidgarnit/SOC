name: YARA Critical Malware Detection
type: any
index: soc-logs-enriched-*
ignore_unavailable: true

filter:
  - term:
      event_type.keyword: "yara_match"

realert:
  minutes: 60

alert_subject: "🧬 [YARA] Malware detected: {0}"
alert_subject_args:
  - rule_name

alert_text_type: alert_text_jinja
alert_text: |
  🧬 YARA CRITICAL MALWARE DETECTION
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Rule       : {{ rule_name | default('N/A') }}
  File       : {{ file_path | default('N/A') }}
  Severity   : {{ severity | default('N/A') }}
  MITRE      : {{ mitre_technique | default('N/A') }}
  Tactic     : {{ mitre_tactic | default('N/A') }}
  Timestamp  : {{ timestamp }}
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Kibana: http://localhost:5601

alert:
  - email
  - slack
email:
  - garnitsaid01@gmail.com
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":biohazard_sign:"
slack_msg_color: "danger"
