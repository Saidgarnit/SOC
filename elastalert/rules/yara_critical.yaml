alert: slack
alert_text: 'YARA: {agent.name} - {rule.description} in {syscheck.path}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match:
          rule.groups: yara
index: wazuh-alerts-*
name: "Wazuh \u2014 YARA Critical Match"
query_key: agent.name
realert:
  minutes: 15
slack_icon_emoji: ':skull_crossbones:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/YOUR_REAL_WEBHOOK
type: any
