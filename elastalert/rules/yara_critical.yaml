alert_text_args:
- '@timestamp'
- agent.name
- agent.ip
- rule.level
- rule.id
- rule.description
- rule.mitre.tactic
- rule.mitre.technique
- rule.mitre.id
- full_log

slack_webhook_url: "${SLACK_WEBHOOK_URL}"
slack_username_override: SOC Alerts
slack_icon_emoji: ':skull_crossbones:'
slack_msg_color: danger
