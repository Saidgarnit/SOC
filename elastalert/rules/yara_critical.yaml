name: "вҳЈпёҸ Wazuh вҖ” YARA Critical Match"
type: any
index: .ds-wazuh-alerts-4.x-*
realert:
  minutes: 15
query_key: agent.name
filter:
- query:
    bool:
      must:
      - match:
          rule.groups: yara

alert:
- slack
alert_text_type: alert_text_only
