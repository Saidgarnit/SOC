name: "Defense Evasion Detected (TA0005)"
type: any
query_key: agent.name
index: wazuh-alerts-*
filter:
  - query:
      bool:
        minimum_should_match: 1
        should:
          - match_phrase:
              rule.groups: "syscheck_entry_modified"
          - match_phrase:
              rule.groups: "syscheck"
          - terms:
              rule.id: ["550", "551", "553", "554"]
alert:
  - slack
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_msg_color: "warning"
alert_text: |
  :shield: *DEFENSE EVASION DETECTED* -- TA0005
  Rule ID: {rule.id}
  Description: {rule.description}
  File: {syscheck.path}
  Agent: {agent.name}
  MITRE: T1222 File Permissions / T1070 Indicator Removal
alert_text_type: alert_text_only
realert:
  minutes: 10
