name: Webshell Indicator Detected
type: any
index: wazuh-alerts-*

filter:
- query:
    query_string:
      query: "rule.groups:webshell OR rule.description:*webshell*"

alert:
- slack

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC Alerts"
slack_emoji_override: ":skull:"
slack_msg_color: danger

alert_text_type: alert_text_only
alert_text: |
  Webshell Detected
  
  Host: {0}
  Path: {1}
  Rule: {2}
  Level: {3}
  SHA256: {4}
  
  Kibana: http://localhost:5601

alert_text_args:
- agent.name
- syscheck.path
- rule.description
- rule.level
- syscheck.sha256_after

realert:
  minutes: 30
