alert: slack
alert_text: 'Webshell: {agent.name} - {rule.description} from {data.srcip}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match:
          rule.groups: web
      - range:
          rule.level:
            gte: 10
index: wazuh-alerts-*
name: "Wazuh \u2014 Webshell Indicator"
query_key: agent.name
realert:
  minutes: 15
slack_icon_emoji: ':ghost:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/YOUR_REAL_WEBHOOK
type: any
