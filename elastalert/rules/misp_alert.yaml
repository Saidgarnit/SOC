alert: slack
alert_text: 'MISP Match: Event {misp_event_id} - %(src_ip)s to %(dest_ip)s:{dest_port}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - exists:
          field: misp_event_id
index: soc-logs-enriched-*
name: MISP IOC Match
query_key: src_ip
realert:
  minutes: 60
slack_icon_emoji: ':red_circle:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
type: any
