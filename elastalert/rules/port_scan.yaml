name: "рџ“Ў Suricata вЂ” Port Scan"
type: any
index: suricata-alerts-*
realert:
  minutes: 30
query_key: src_ip
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - bool:
          should:
          - match_phrase:
              alert.signature: Port Scan
          - match_phrase:
              alert.signature: Port Scan SYN
          minimum_should_match: 1
      must_not:
      - terms:
          src_ip:
          - 172.18.0.26
          - 172.18.0.18
          - 172.18.0.14
          - 172.18.0.11
          - 172.18.0.17
          - 172.18.0.20
          - 172.18.0.22
          - 172.18.0.1
          - 172.18.0.2
          - 172.18.0.3
          - 172.18.0.4
          - 172.18.0.5

alert:
- slack
alert_text_type: alert_text_only
alert_text: "\nрџ“Ў *Suricata вЂ” Port Scan*\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nTime: {0}\nSignature: {1}\nSeverity: {2} | Category: {3}\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nNetwork:\n  Attacker: {4}:{5}\n  Target: {6}:{7}\n  Proto: {8} | Interface: {9}\n  Community ID: {10}\n  Action: {11}\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nMITRE: T1595 вЂ” Active Scanning\nKibana: http://localhost:5601\n"
alert_text_args:
- '@timestamp'
- alert.signature
- alert.severity
- alert.category
- src_ip
- src_port
- dest_ip
- dest_port
- proto
- in_iface
- community_id
- alert.action

slack_webhook_url: "${SLACK_WEBHOOK_URL}"
slack_username_override: SOC Alerts
slack_icon_emoji: ':mag:'
slack_msg_color: warning
