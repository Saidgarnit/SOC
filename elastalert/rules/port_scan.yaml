name: "🔍 Port Scan — Network Reconnaissance"
type: frequency
index: suricata-alerts-*
num_events: 10
timeframe:
  seconds: 10
realert:
  hours: 1
query_key: src_ip
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - bool:
          should:
          - match_phrase:
              alert.signature: "Port Scan SYN"
          - match_phrase:
              alert.signature: "Port Scan"
          minimum_should_match: 1
      must_not:
      - terms:
          src_ip:
          - "172.18.0.1"
          - "172.18.0.2"
          - "172.18.0.3"
          - "172.18.0.4"
          - "172.18.0.5"
          - "172.18.0.6"
          - "172.18.0.7"
          - "172.18.0.8"
          - "172.18.0.9"
          - "172.18.0.10"
          - "172.18.0.11"
          - "172.18.0.12"
          - "172.18.0.13"
          - "172.18.0.14"
          - "172.18.0.15"
          - "172.18.0.16"
          - "172.18.0.17"
          - "172.18.0.18"
          - "172.18.0.19"
          - "172.18.0.20"
          - "172.18.0.21"
          - "172.18.0.22"
          - "172.18.0.23"
          - "172.18.0.24"
          - "172.18.0.25"
          - "172.18.0.26"
          - "172.18.0.27"
          - "172.18.0.28"
          - "172.18.0.29"
          - "172.18.0.30"
          - "172.18.0.31"
          - "172.18.0.32"
          - "172.18.0.33"
          - "172.18.0.34"

alert:
- slack
alert_text_type: alert_text_only
alert_text: |
  🔍 *Port Scan Detected*
  `SURICATA / Network Reconnaissance`

  🕐 `{0}`
  📋 Rule: {1}  Severity: {2}

  🔴 Attacker  {4} : {5}
  🔵 Target    {6} : {7}
  📡 {8}  via  {9}

  🔗 T1595 — Active Scanning
  📊 http://localhost:5601
alert_text_args:
- "@timestamp"
- alert.signature
- alert.severity
- alert.category
- src_ip
- src_port
- dest_ip
- dest_port
- proto
- in_iface

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC Alerts"
slack_icon_emoji: ":mag:"
slack_msg_color: warning
