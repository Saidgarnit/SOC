alert:
- slack
alert_text: "\n\U0001F4E1 *Suricata IDS \u2014 Port Scan*\n-----------------------------------------\n\
  \U0001F552 *Timestamp:* {0}\n\U0001F464 *Host:* {1}\n\U0001F4CA *Level:* {2}\n\U0001F6E1\
  \uFE0F *MITRE:* {3}\n\U0001F30D *GeoIP:* {4}\n\U0001F4DD *Summary:* {5}\n-----------------------------------------\n\
  \U0001F50E *Context:*\n\U0001F310 *Src IP:* {6}\n\U0001F3AF *Dst IP:* {7}\n-----------------------------------------\n\
  \U0001F517 *Kibana:* http://localhost:5601\n"
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - bool:
          should:
          - match_phrase:
              alert.signature: Port Scan
          - match_phrase:
              alert.category: Attempted Information Leak
index: soc-logs-enriched-*
name: "Suricata IDS \u2014 Port Scan"
query_key: src_ip
realert:
  minutes: 30
slack_icon_emoji: ':mag:'
slack_msg_color: warning
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
type: any
alert_text_args:
- '@timestamp'
- agent.name
- rule.level
- rule.mitre.id
- GeoLocation.city_name
- rule.description
- srcip
- dstip
