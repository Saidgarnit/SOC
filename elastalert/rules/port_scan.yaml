alert: slack
alert_text: 'Port Scan: %(alert.signature)s from %(src_ip)s to %(dest_ip)s'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - bool:
          should:
          - match_phrase:
              alert.signature: Port Scan
          - match_phrase:
              alert.category: Attempted Information Leak
index: soc-logs-enriched-*
name: "Suricata IDS \u2014 Port Scan"
query_key: src_ip
realert:
  minutes: 30
slack_icon_emoji: ':mag:'
slack_msg_color: warning
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
type: any
