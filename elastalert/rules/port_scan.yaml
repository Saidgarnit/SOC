name: Port Scan Detected
type: any
index: suricata-alerts-*
filter:
- query:
    query_string:
      query: 'event_type:alert AND alert.signature:"Port Scan SYN"'
alert:
  - slack
  - hivealerter
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "Wazuh ElastAlert"
slack_emoji_override: ":rotating_light:"
alert_text_type: alert_text_only
alert_text: |
  🚨 *Port Scan Detected*
  *Source IP:* {0}
  *Destination:* {1}:{2}
  *Signature:* {3}
  *Severity:* {4}
  *Protocol:* {5}
  *Timestamp:* {6}
alert_text_args:
  - src_ip
  - dest_ip
  - dest_port
  - alert.signature
  - alert.severity
  - proto
  - timestamp
alert_subject: "🚨 Port Scan Detected from {0}"
alert_subject_args:
  - src_ip
realert:
  minutes: 0

query_key: data.srcip
  - src_ip
realert:
  minutes: 30


hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "qaU5mFxE64fL+5yihYHoqA68J5yeJoEg"
hive_alert_config:
  title: "{match[rule.description]}"
  type: "external"
  source: "elastalert"
  description: "Detected by ElastAlert rule\n\nIndex: {rule[index]}"
  severity: 2
  tags: ["soc-alert", "elastalert"]
