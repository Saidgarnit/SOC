name: Port Scan Detected
type: any
index: suricata-alerts-*

filter:
- query:
    query_string:
      query: 'event_type:alert AND alert.category:"Attempted Information Leak"'

alert:
  - slack

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "Wazuh ElastAlert"
slack_emoji_override: ":suricata:"

alert_text: |
  🚨 *Port Scan Detected*
  
  *Source IP:* {src_ip}
  *Destination:* {dest_ip}:{dest_port}
  *Signature:* {alert.signature}
  *Severity:* {alert.severity}
  *Category:* {alert.category}
  *Protocol:* {proto}
  
  *Timestamp:* {timestamp}

alert_subject: "🚨 Port Scan Detected from {src_ip}"

realert:
  minutes: 30

query_key: 
  - src_ip
