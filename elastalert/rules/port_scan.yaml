alert: slack
alert_text: 'Port Scan: {alert.signature} from {src_ip} to {dest_ip}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - bool:
          should:
          - match_phrase:
              alert.signature: Port Scan
          - match_phrase:
              alert.category: Attempted Information Leak
index: soc-logs-enriched-*
name: "Suricata IDS \u2014 Port Scan"
query_key: src_ip
realert:
  minutes: 30
slack_icon_emoji: ':mag:'
slack_msg_color: warning
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/YOUR_REAL_WEBHOOK
type: any
