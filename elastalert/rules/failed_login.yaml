alert:
- slack
- hivealerter
alert_text: "\U0001F7E1 Failed Login — {0} → {1}\n   AUTHENTICATION FAILURE\n\n  \
  \ Source IP  : {0}\n   Target User: {2}\n   Host       : {1}\n   Rule       : {3}\n\
  \   Rule ID    : {4}\n   Level      : {5}\n   Timestamp  : {6}\n   Kibana     :\
  \ http://localhost:5601"
alert_text_args:
- data.srcip
- agent.name
- data.dstuser
- rule.description
- rule.id
- rule.level
- '@timestamp'
alert_text_type: alert_text_only
query_key: data.srcip
filter:
- query:
    query_string:
      query: rule.groups:"authentication_failed" AND NOT rule.groups:"sshd"
index: soc-logs-enriched-*
name: Failed Login Attempt
realert:
  minutes: 5
slack_emoji_override: ':warning:'
slack_msg_color: warning
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
type: any


hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "qaU5mFxE64fL+5yihYHoqA68J5yeJoEg"
hive_alert_config:
  title: "{match[rule.description]}"
  type: "external"
  source: "elastalert"
  description: "Detected by ElastAlert rule\n\nIndex: {rule[index]}"
  severity: 2
  tags: ["soc-alert", "elastalert"]
