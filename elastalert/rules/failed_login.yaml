alert: slack
alert_text: 'Failed Login: {agent.name} from {data.srcip}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match:
          rule.groups: authentication_failed
index: wazuh-alerts-*
name: "Wazuh \u2014 Failed Login"
num_events: 3
query_key: agent.name
realert:
  minutes: 10
slack_icon_emoji: ':no_entry:'
slack_msg_color: warning
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/YOUR_REAL_WEBHOOK
timeframe:
  minutes: 1
type: frequency
