alert: slack
alert_text: 'Auth Brute Force: {agent.name} from {data.srcip}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match:
          rule.groups: authentication_failures
index: wazuh-alerts-*
name: "Wazuh \u2014 Authentication Brute Force"
num_events: 5
query_key:
- agent.name
- data.srcip
realert:
  minutes: 30
slack_icon_emoji: ':lock:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/YOUR_REAL_WEBHOOK
timeframe:
  minutes: 2
type: frequency
