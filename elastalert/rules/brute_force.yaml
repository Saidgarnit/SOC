name: "🔨 Auth Brute Force — Wazuh"
type: frequency
index: .ds-wazuh-alerts-4.x-*
num_events: 8
timeframe:
  minutes: 3
realert:
  minutes: 45
query_key:
- agent.name
- data.srcip
filter:
- query:
    bool:
      must:
      - terms:
          rule.groups:
          - authentication_failed

alert:
- slack
alert_text_type: alert_text_only
alert_text: |
  🔨 *Authentication Brute Force*
  `WAZUH / Credential Attack`

  🕐 `{0}`
  🖥️  Host: {1}  ({2})
  📋 Level: {3}  Rule: {4}
  📝 {5}

  🔴 Attacker: {9}
  👤 Target:   {10}

  🎯 MITRE: {8} — {6} / {7}
  📊 http://localhost:5601
alert_text_args:
- "@timestamp"
- agent.name
- agent.ip
- rule.level
- rule.id
- rule.description
- rule.mitre.tactic
- rule.mitre.technique
- rule.mitre.id
- data.srcip
- data.dstuser

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC Alerts"
slack_icon_emoji: ":hammer:"
slack_msg_color: danger
