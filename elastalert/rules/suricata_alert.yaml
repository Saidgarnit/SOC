alert: slack
alert_text: 'C2 Beaconing: {alert.signature} from {src_ip} to {dest_ip}:{dest_port}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - match_phrase:
          alert.signature: C2 Beaconing
index: soc-logs-enriched-*
name: "Suricata IDS \u2014 C2 Beaconing"
num_events: 3
query_key:
- src_ip
- dest_ip
realert:
  minutes: 60
slack_icon_emoji: ':satellite:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/YOUR_REAL_WEBHOOK
timeframe:
  minutes: 10
type: frequency
