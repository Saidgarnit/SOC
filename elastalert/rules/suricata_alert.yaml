name: Suricata IDS Alert
type: any
index: suricata-alerts-*
filter:
- query:
    query_string:
      query: 'event_type:alert'
alert:
- slack
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC Alerts"
slack_emoji_override: ":rotating_light:"
slack_msg_color: danger
alert_text_type: alert_text_only
alert_text: "\U0001F6A8 Suricata IDS Alert\n\n   Signature : {0}\n   Src IP    : {1}\n   Proto     : {2}\n   Severity  : {3}\n   Kibana    : http://localhost:5601"
alert_text_args:
- alert.signature
- src_ip
- proto
- alert.severity
realert:
  minutes: 10
