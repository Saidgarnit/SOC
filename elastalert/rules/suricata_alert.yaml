name: Suricata IDS Alert
type: any
index: suricata-alerts-*
filter:
- query:
    query_string:
      query: "event_type:alert"
alert:
- slack
- hivealerter
slack_webhook_url: https://hooks.slack.com/services/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
slack_msg_color: danger
alert_text_type: alert_text_only
alert_text: "🚨 *SURICATA IDS ALERT*\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n*Rule:* {0}\n*Category:* {1}\n*Severity:* {2}\n*Source:* `{3}` → *Dest:* `{4}:{5}`\n*Protocol:* {6}\n*Detected at:* {7}\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n_NetDefender SOC — Suricata IDS_"
alert_text_args:
- alert.signature
- alert.category
- alert.severity
- src_ip
- dest_ip
- dest_port
- proto
- '@timestamp'
alert_missing_value: N/A
realert:
  minutes: 5
alert_subject: "SOC - IDS: {0}"
alert_subject_args:
- alert.signature
hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "ZA7Uh9G0yWMZK/n1KvapNB3qp0Bc224H"
  hive_verify_cert: false
hive_organisation: SOC
hive_alert_config:
  type: external
  source: suricata
  title: 'Suricata IDS Alert'
  description: 'Suricata fired {match[alert][signature]} from {match[src_ip]} to {match[dest_ip]}'
  rule.level: 3
  tags:
  - suricata
  - ids
  status: New
