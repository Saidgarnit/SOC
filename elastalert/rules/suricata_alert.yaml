alert:
- slack
alert_text: "\n\U0001F6E1\uFE0F *Suricata IDS \u2014 C2 Beaconing*\n-----------------------------------------\n\
  \U0001F552 *Timestamp:* {0}\n\U0001F464 *Host:* {1}\n\U0001F4CA *Level:* {2}\n\U0001F6E1\
  \uFE0F *MITRE:* {3}\n\U0001F30D *GeoIP:* {4}\n\U0001F4DD *Summary:* {5}\n-----------------------------------------\n\
  \U0001F50E *Context:*\n\U0001F310 *Src IP:* {6}\n\U0001F3AF *Dst IP:* {7}\n-----------------------------------------\n\
  \U0001F517 *Kibana:* http://localhost:5601\n"
alert_text_args:
- '@timestamp'
- agent.name
- rule.level
- rule.mitre.id
- GeoLocation.city_name
- rule.description
- src_ip
- dest_ip
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match_phrase:
          alert.signature: C2 Beaconing
      must_not:
      - terms:
          dest_ip:
          - 91.189.91.83
          - 91.189.91.84
          - 34.120.127.130
          - 199.232.82.217
          - 34.95.113.255
          - 76.223.57.73
          - 18.134.215.41
          - 3.33.241.96
index: suricata-alerts-*
name: "Suricata IDS \u2014 C2 Beaconing"
num_events: 3
query_key:
- src_ip
- dest_ip
realert:
  minutes: 60
slack_icon_emoji: ':satellite:'
slack_msg_color: warning
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
timeframe:
  minutes: 10
type: frequency
