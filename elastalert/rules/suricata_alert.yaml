alert: slack
alert_text: 'C2 Beaconing: {0} from {1} to {2}'
alert_text_args:
  - alert.signature
  - src_ip
  - dest_ip
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match_phrase:
          alert.signature: C2 Beaconing
      must_not:
      - terms:
          dest_ip:
            - "91.189.91.83"
            - "91.189.91.84"
            - "34.120.127.130"
            - "199.232.82.217"
            - "34.95.113.255"
            - "76.223.57.73"
            - "18.134.215.41"
            - "3.33.241.96"
index: suricata-alerts-*
name: "Suricata IDS — C2 Beaconing"
num_events: 3
query_key:
- src_ip
- dest_ip
realert:
  minutes: 60
slack_icon_emoji: ':satellite:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
timeframe:
  minutes: 10
type: frequency
