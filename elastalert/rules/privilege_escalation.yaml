name: "⬆️  Privilege Escalation — Wazuh"
type: any
index: .ds-wazuh-alerts-4.x-*
realert:
  minutes: 15
query_key: agent.name
filter:
- query:
    bool:
      minimum_should_match: 1
      should:
      - terms:
          rule.groups:
          - priv_esc
      - terms:
          rule.groups:
          - sudo

alert:
- slack
alert_text_type: alert_text_only
alert_text: |
  ⬆️  *Privilege Escalation*
  `WAZUH / Privilege Abuse`

  🕐 `{0}`
  🖥️  Host: {1}  ({2})
  📋 Level: {3}  Rule: {4}
  📝 {5}

  👤 User: {9}

  🎯 MITRE: {8} — {6} / {7}
  📊 http://localhost:5601
alert_text_args:
- "@timestamp"
- agent.name
- agent.ip
- rule.level
- rule.id
- rule.description
- rule.mitre.tactic
- rule.mitre.technique
- rule.mitre.id
- data.dstuser

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC Alerts"
slack_icon_emoji: ":arrow_double_up:"
slack_msg_color: danger
