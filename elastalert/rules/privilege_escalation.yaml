alert: slack
alert_text: 'Priv Esc: %(agent.name)s - {system.auth.sudo.command}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      minimum_should_match: 1
      should:
      - match:
          rule.groups: priv_esc
      - match:
          rule.groups: sudo
index: .ds-wazuh-alerts-4.x-*
name: "Wazuh \u2014 Privilege Escalation"
query_key: agent.name
realert:
  minutes: 10
slack_icon_emoji: ':arrow_double_up:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
type: any
