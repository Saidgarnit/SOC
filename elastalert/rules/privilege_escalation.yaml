name: "Wazuh — Privilege Escalation"
type: any
index: wazuh-alerts-*

filter:
- query:
    bool:
      minimum_should_match: 1
      should:
      - match:
          rule.groups: priv_esc
      - match:
          rule.groups: sudo

query_key: agent.name
realert:
  minutes: 10

alert: slack
slack_webhook_url: "https://hooks.slack.com/services/YOUR_REAL_WEBHOOK"
slack_username_override: "SOC Alerts"
slack_icon_emoji: ":arrow_double_up:"
slack_msg_color: danger
alert_text_type: alert_text_only
alert_text: |
  *Privilege Escalation Detected*
  *Severity:* CRITICAL
  *Agent:* {agent.name}
  *Command:* {system.auth.sudo.command}
  *User:* {system.auth.sudo.user}
  *Attack Method:* sudo / privilege escalation
  *Timestamp:* {timestamp}
  *Dashboard:* http://localhost:5601/app/discover

