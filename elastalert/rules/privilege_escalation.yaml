name: Privilege Escalation Attempt
type: any
query_key: agent.name
index: soc-logs-enriched-*
filter:
  - query:
      query_string:
        query: 'rule.mitre.tactic:"Privilege Escalation" OR rule.groups:"privilege_escalation" OR rule.groups:"sudo" OR rule.groups:"suid"'
alert:
  - slack
  - hivealerter
slack_webhook_url: https://hooks.slack.com/services/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
slack_username_override: SOC Alerts
slack_emoji_override: ':rotating_light:'
slack_msg_color: danger
alert_text_type: alert_text_only
alert_text: |
  🚨 Privilege Escalation — {0}
     PRIVILEGE ESCALATION

     Host       : {0}
     Rule       : {1}
     Rule ID    : {2}
     Level      : {3}
     Timestamp  : {4}
     MITRE      : {5}
     Kibana     : http://localhost:5601
alert_text_args:
  - agent.name
  - rule.description
  - rule.id
  - rule.level
  - '@timestamp'
  - rule.mitre.id
realert:
  minutes: 2


hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "qaU5mFxE64fL+5yihYHoqA68J5yeJoEg"
hive_alert_config:
  title: "{match[rule.description]}"
  type: "external"
  source: "elastalert"
  description: "Detected by ElastAlert rule\n\nIndex: {rule[index]}"
  severity: 2
  tags: ["soc-alert", "elastalert"]
