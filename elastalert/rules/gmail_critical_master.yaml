name: Critical Alert Master Notification
type: any
index: soc-logs-enriched-*
filter:
  - range:
      rule.level:
        gte: 10
alert:
  - email
  - hivealerter
email:
  - "garnitsaid01@gmail.com"
smtp_host: "smtp.gmail.com"
smtp_port: 587
smtp_ssl: false
smtp_starttls: true
from_addr: "garnitsaid01@gmail.com"
smtp_auth_file: "/opt/elastalert/smtp_auth.yaml"
alert_subject: "CRITICAL SOC Alert: {0}"
alert_subject_args:
  - rule.description
alert_text_type: alert_text_only
alert_text: |
  CRITICAL SECURITY ALERT
  Timestamp  : {0}
  Host       : {1}
  Rule       : {2}
  Severity   : {3}
  MITRE      : {4}
  Kibana     : http://localhost:5601
alert_text_args:
  - '@timestamp'
  - agent.name
  - rule.description
  - rule.level
  - rule.mitre.tactic
hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "qaU5mFxE64fL+5yihYHoqA68J5yeJoEg"
  hive_verify_cert: false
  hive_organisation: "SOC"
hive_alert_config:
  type: external
  source: elastalert
  title: "{rule.description} on {agent.name}"
  description: "Wazuh rule {rule.id} fired on {agent.name} at level {rule.level}. MITRE Tactic: {rule.mitre.tactic}"
  severity: 3
  tags:
    - wazuh
    - mitre
    - critical
  status: New
realert:
  minutes: 10
