name: "Kill Chain Detected \u2014 Multi-Stage Attack"
type: frequency
index: wazuh-alerts-4.x-*
num_events: 2
timeframe:
  minutes: 15
filter:
- query:
    bool:
      minimum_should_match: 1
      should:
      - query_string:
          query: rule.groups:privilege_escalation AND rule.level:[10 TO *]
      - query_string:
          query: rule.mitre.tactic:"Lateral Movement" AND rule.level:[8 TO *]
      - query_string:
          query: rule.mitre.tactic:"Execution" AND rule.level:[8 TO *]
      - query_string:
          query: rule.groups:web AND rule.level:[10 TO *]
      - query_string:
          query: rule.mitre.id:T1548 OR rule.mitre.id:T1059 OR rule.mitre.id:T1021
query_key: agent.name
