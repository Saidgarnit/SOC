name: Resource Development Detected (T1588)
type: any
index: wazuh-alerts-*
filter:
- query:
    query_string:
      query: rule.groups:*syscheck* AND syscheck.event:("added" OR "modified") AND syscheck.path:("/tmp/*" OR "/dev/shm/*" OR "/var/tmp/*")
alert_text_type: alert_text_only
alert_text: "🟠 *Resource Development Detected (T1588)*\n\n*Host:* {0}\n*File:* {1}\n*Action:* {2}\n*Rule:* {3}\n*Timestamp:* {4}"
alert_text_args: [agent.name, syscheck.path, syscheck.event, rule.description, '@timestamp']
alert:
- slack
slack_webhook_url: https://hooks.slack.com/services/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
slack_username_override: SOC Alerts
slack_emoji_override: ':warning:'
slack_msg_color: warning
realert:
  minutes: 10
