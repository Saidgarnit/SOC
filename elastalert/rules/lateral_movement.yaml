alert: slack
alert_text: 'Lateral Movement: {agent.name} from {data.srcip}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match:
          rule.groups: authentication_success
      - range:
          rule.level:
            gte: 8
index: wazuh-alerts-*
name: "Wazuh \u2014 Lateral Movement"
num_events: 3
query_key:
- data.srcip
realert:
  minutes: 20
slack_icon_emoji: ':left_right_arrow:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/YOUR_REAL_WEBHOOK
timeframe:
  minutes: 5
type: frequency
