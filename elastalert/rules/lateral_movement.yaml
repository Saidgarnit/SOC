name: Lateral Movement Detected
type: frequency
index: .ds-wazuh-alerts-4.x-*,.ds-wazuh-alerts-4.x-*
ignore_unavailable: true

num_events: 5
timeframe:
  minutes: 5

query_key: agent.name

filter:
  - bool:
      should:
        - term:
            rule.groups: "authentication_success"
        - term:
            rule.groups: "sshd"
        - term:
            rule.groups: "win_lateral_movement"
        - term:
            rule.groups: "smb"
      minimum_should_match: 1

realert:
  minutes: 60

alert_subject: "🔀 [HIGH] Lateral Movement — {0} on {1}"
alert_subject_args:
  - num_hits
  - agent.name

alert_text_type: alert_text_jinja
alert_text: |
  🔀 LATERAL MOVEMENT DETECTED
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Host       : {{ agent.name | default('N/A') }}
  Attempts   : {{ num_hits }} in 5 minutes
  Timestamp  : {{ timestamp }}
  Source IP  : {{ data.srcip | default('N/A') }}
  User       : {{ (data or {}).get('dstuser', 'N/A') | default('N/A') | default(data.srcuser) | default('N/A') }}
  Rule ID    : {{ rule.id | default('N/A') }}
  Description: {{ rule.description | default('N/A') }}
  MITRE      : T1021 - Remote Services
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Kibana: http://localhost:5601

alert:
  - email
  - slack
email:
  - garnitsaid01@gmail.com
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":arrows_counterclockwise:"
slack_msg_color: "danger"
