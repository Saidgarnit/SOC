alert:
- slack
- hivealerter
alert_text: "\U0001F504 Lateral Movement — {0} → {1}\n   LATERAL MOVEMENT\n\n   Source\
  \ IP  : {0}\n   Host       : {1}\n   Rule       : {2}\n   Rule ID    : {3}\n   Level\
  \      : {4}\n   Timestamp  : {5}\n   MITRE      : {6}\n   Kibana     : http://localhost:5601"
alert_text_args:
- data.srcip
- agent.name
- rule.description
- rule.id
- rule.level
- '@timestamp'
- rule.mitre.id
alert_text_type: alert_text_only
query_key: data.srcip
filter:
- query:
    query_string:
      query: rule.mitre.tactic:"Lateral Movement"
index: soc-logs-enriched-*
name: Lateral Movement Detected
slack_emoji_override: ':arrows_counterclockwise:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
type: any
realert:
  minutes: 10


hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "qaU5mFxE64fL+5yihYHoqA68J5yeJoEg"
hive_alert_config:
  title: "{match[rule.description]}"
  type: "external"
  source: "elastalert"
  description: "Detected by ElastAlert rule\n\nIndex: {rule[index]}"
  severity: 2
  tags: ["soc-alert", "elastalert"]
