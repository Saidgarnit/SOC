name: "↔️  Lateral Movement — Wazuh"
type: frequency
index: .ds-wazuh-alerts-4.x-*
num_events: 3
timeframe:
  minutes: 5
realert:
  minutes: 20
query_key: data.srcip
filter:
- query:
    bool:
      must:
      - terms:
          rule.groups:
          - authentication_success
      - range:
          rule.level:
            gte: 8

alert:
- slack
alert_text_type: alert_text_only
alert_text: |
  ↔️  *Lateral Movement*
  `WAZUH / Persistence`

  🕐 `{0}`
  🖥️  Host: {1}  ({2})
  📋 Level: {3}  Rule: {4}
  📝 {5}

  🔴 From: {9}
  👤 As:   {10}

  🎯 MITRE: {8} — {6} / {7}
  📊 http://localhost:5601
alert_text_args:
- "@timestamp"
- agent.name
- agent.ip
- rule.level
- rule.id
- rule.description
- rule.mitre.tactic
- rule.mitre.technique
- rule.mitre.id
- data.srcip
- data.dstuser

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC Alerts"
slack_icon_emoji: ":left_right_arrow:"
slack_msg_color: warning
