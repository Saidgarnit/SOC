name: "💥 Network Brute Force — SSH/RDP/FTP"
type: frequency
index: suricata-alerts-*
num_events: 8
timeframe:
  minutes: 3
realert:
  minutes: 45
query_key:
- src_ip
- dest_ip
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - bool:
          should:
          - match_phrase:
              alert.signature: "SSH Brute Force"
          - match_phrase:
              alert.signature: "RDP Brute Force"
          - match_phrase:
              alert.signature: "FTP Brute Force"
          minimum_should_match: 1

alert:
- slack
alert_text_type: alert_text_only
alert_text: |
  💥 *Network Brute Force*
  `SURICATA / Credential Attack`

  🕐 `{0}`
  📋 Rule: {1}  Severity: {2}

  🔴 Attacker  {4} : {5}
  🔵 Target    {6} : {7}
  📡 {8}  via  {9}

  🔗 T1110 — Brute Force
  📊 http://localhost:5601
alert_text_args:
- "@timestamp"
- alert.signature
- alert.severity
- alert.category
- src_ip
- src_port
- dest_ip
- dest_port
- proto
- in_iface

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC Alerts"
slack_icon_emoji: ":lock:"
slack_msg_color: danger
