alert:
- slack
- hivealerter
alert_text: "\U0001F9EC YARA Match — {0}\n   MALWARE SIGNATURE\n\n   Host       :\
  \ {0}\n   Path       : {1}\n   YARA Rule  : {2}\n   SHA256     : {3}\n   Rule  \
  \     : {4}\n   Timestamp  : {5}\n   Kibana     : http://localhost:5601"
alert_text_args:
- agent.name
- syscheck.path
- yara_rule_name
- syscheck.sha256_after
- rule.description
- '@timestamp'
alert_text_type: alert_text_only
query_key: agent.name
filter:
- query:
    query_string:
      query: yara_matched:true
index: soc-logs-enriched-*
name: YARA Rule Match
realert:
  minutes: 30
slack_emoji_override: ':dna:'
slack_msg_color: danger
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
type: any


hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "qaU5mFxE64fL+5yihYHoqA68J5yeJoEg"
hive_alert_config:
  title: "{match[rule.description]}"
  type: "external"
  source: "elastalert"
  description: "Detected by ElastAlert rule\n\nIndex: {rule[index]}"
  severity: 2
  tags: ["soc-alert", "elastalert"]
