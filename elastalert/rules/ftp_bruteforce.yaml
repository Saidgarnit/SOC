name: FTP Brute Force Detected
type: frequency
index: wazuh-alerts-4.x-*,.ds-wazuh-alerts-4.x-*
ignore_unavailable: true

num_events: 6
timeframe:
  minutes: 2

query_key: data.srcip

filter:
  - bool:
      should:
        - term:
            rule.groups: "authentication_failed"
        - term:
            rule.groups: "vsftpd"
        - term:
            rule.groups: "proftpd"
        - term:
            rule.groups: "ftp"
      minimum_should_match: 1

realert:
  minutes: 60

alert_subject: "📁 [HIGH] FTP Brute Force — {0} attempts from {1}"
alert_subject_args:
  - num_hits
  - data.srcip

alert_text_type: alert_text_jinja
alert_text: |
  📁 FTP BRUTE FORCE DETECTED
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Attacker   : {{ data_srcip | default('N/A') }}
  Target User: {{ (data or {}).get('dstuser', 'N/A') | default('N/A') | default('N/A') }}
  Attempts   : {{ num_hits }} in 2 minutes
  Timestamp  : {{ timestamp }}
  Agent/Host : {{ agent.name | default('N/A') }}
  Rule ID    : {{ rule_id | default('N/A') }}
  Description: {{ rule_description | default('N/A') }}
  MITRE      : T1110.001 - Brute Force: Password Guessing (FTP)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  Kibana: http://localhost:5601

alert:
  - email
  - slack

email:
  - garnitsaid01@gmail.com

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":file_folder:"
slack_msg_color: "danger"
