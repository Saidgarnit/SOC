alert: slack
alert_text: 'FTP Brute Force: %(alert.signature)s from %(src_ip)s to %(dest_ip)s:{dest_port}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - match:
          alert.category: Attempted Administrator Privilege Gain
index: soc-logs-enriched-*
name: "Suricata IDS \u2014 FTP Brute Force"
num_events: 5
query_key:
- src_ip
- dest_ip
realert:
  minutes: 30
slack_icon_emoji: ':file_cabinet:'
slack_msg_color: warning
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
timeframe:
  minutes: 2
type: frequency
