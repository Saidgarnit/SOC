name: "📁 FTP Brute Force — Credential Attack"
type: frequency
index: suricata-alerts-*
num_events: 5
timeframe:
  minutes: 2
realert:
  minutes: 30
query_key:
- src_ip
- dest_ip
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - match_phrase:
          alert.signature: "FTP Brute Force"

alert:
- slack
alert_text_type: alert_text_only
alert_text: |
  📁 *FTP Brute Force*
  `SURICATA / Credential Attack`

  🕐 `{0}`
  📋 Rule: {1}  Severity: {2}

  🔴 Attacker    {4} : {5}
  🔵 FTP Server  {6} : {7}
  📡 {8}  via  {9}

  🔗 T1110.001 — Password Guessing
  📊 http://localhost:5601
alert_text_args:
- "@timestamp"
- alert.signature
- alert.severity
- alert.category
- src_ip
- src_port
- dest_ip
- dest_port
- proto
- in_iface

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC Alerts"
slack_icon_emoji: ":file_cabinet:"
slack_msg_color: danger
