name: FTP Brute Force Attack
type: frequency
query_key: data.srcip
index: soc-logs-enriched-*
num_events: 5
timeframe:
  minutes: 5

filter:
- query:
    query_string:
      query: rule.id:"11403" AND agent.name:*

alert_text_type: alert_text_only
alert_text: "🔴 *FTP Brute Force Attack Detected*\n\n\
*Source IP  :* {0}\n\
*Target User:* {2}\n\
*Host       :* {1}\n\
*Rule       :* {3}\n\
*Rule ID    :* {4}\n\
*Level      :* {5}\n\
*Timestamp  :* {6}\n\
*Kibana     :* http://localhost:5601"

alert_text_args:
- data.srcip
- agent.name
- data.dstuser
- rule.description
- rule.id
- rule.level
- '@timestamp'

alert:
- slack
- hivealerter
slack_webhook_url: https://hooks.slack.com/services/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
slack_username_override: SOC Alerts
slack_emoji_override: ':warning:'
slack_msg_color: danger
realert:
  minutes: 2


hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "qaU5mFxE64fL+5yihYHoqA68J5yeJoEg"
hive_alert_config:
  title: "{match[rule.description]}"
  type: "external"
  source: "elastalert"
  description: "Detected by ElastAlert rule\n\nIndex: {rule[index]}"
  severity: 2
  tags: ["soc-alert", "elastalert"]
