name: "Exfiltration Detected (TA0010)"
type: spike
index: wazuh-alerts-*
spike_height: 3
spike_type: up
timeframe:
  minutes: 5
filter:
  - query:
      bool:
        minimum_should_match: 1
        should:
          - query_string:
              query: 'data.alert.signature:*ET*TROJAN* OR data.alert.signature:*ET*DNS*'
          - query_string:
              query: 'rule.description:*ftp* AND rule.level:[7 TO *]'
          - query_string:
              query: 'rule.mitre.id:T1048 OR rule.mitre.id:T1041 OR rule.mitre.id:T1567'
query_key: agent.name
threshold_ref: 10
threshold_cur: 20
alert:
  - slack
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_msg_color: "danger"
slack_username_override: "SOC Alerts"
slack_emoji_override: ":warning:"
alert_text: |
  EXFILTRATION SPIKE DETECTED -- TA0010
  Agent: {agent.name}
  Current window: {spike_count} events
  Reference window: {reference_count} events
  Spike ratio: {spike_count}x baseline
  MITRE: T1048 Exfil over Alt Protocol / T1041 Exfil over C2
alert_text_type: alert_text_only
realert:
  minutes: 10
