name: "🤖 MQTT Anomaly — IoT Attack"
type: any
index: suricata-alerts-*
realert:
  minutes: 30
query_key: src_ip
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - match_phrase:
          alert.signature: "MQTT"

alert:
- slack
alert_text_type: alert_text_only
alert_text: |
  🤖 *MQTT Anomaly Detected*
  `SURICATA / IoT Threat`

  🕐 `{0}`
  📋 Rule: {1}  Severity: {2}

  🔴 Source   {4} : {5}
  🔵 Broker   {6} : {7}
  📡 {8}  via  {9}

  🔗 T1071.001 — Application Layer Protocol
  📊 http://localhost:5601
alert_text_args:
- "@timestamp"
- alert.signature
- alert.severity
- alert.category
- src_ip
- src_port
- dest_ip
- dest_port
- proto
- in_iface

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC Alerts"
slack_icon_emoji: ":robot_face:"
slack_msg_color: warning
