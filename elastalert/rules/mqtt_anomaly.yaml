alert: slack
alert_text: 'MQTT Anomaly: %(alert.signature)s from %(src_ip)s to %(dest_ip)s:{dest_port}'
alert_text_type: alert_text_only
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - match_phrase:
          alert.signature: MQTT
index: soc-logs-enriched-*
name: MQTT Anomaly Detection
query_key: src_ip
realert:
  minutes: 30
slack_icon_emoji: ':wireless:'
slack_msg_color: warning
slack_username_override: SOC Alerts
slack_webhook_url: https://hooks.slack.com/services/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
type: any
