name: "рҹӨ– IoT вҖ” MQTT Anomaly"
type: any
index: soc-logs-enriched*
realert:
  minutes: 30
query_key: src_ip
filter:
- query:
    bool:
      must:
      - match:
          event_type: alert
      - match_phrase:
          alert.signature: MQTT

alert:
- slack
alert_text_type: alert_text_only
alert_text: "\nрҹӨ– *IoT вҖ” MQTT Anomaly*\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nTime: {0}\nSignature: {1}\nSeverity: {2} | Category: {3}\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nNetwork:\n  Source: {4}:{5}\n  Broker: {6}:{7}\n  Proto: {8} | Interface: {9}\n  Community ID: {10}\n  Action: {11}\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nMITRE: T1437 вҖ” Application Layer Protocol\nKibana: http://localhost:5601\n"
alert_text_args:
- '@timestamp'
- alert.signature
- alert.severity
- alert.category
- src_ip
- src_port
- dest_ip
- dest_port
- proto
- in_iface
- community_id
- alert.action

slack_webhook_url: "${SLACK_WEBHOOK_URL}"
slack_username_override: SOC Alerts
slack_icon_emoji: ':robot_face:'
slack_msg_color: warning
