name: MQTT Anomaly Detected
type: frequency
index: soc-logs-enriched-*
ignore_unavailable: true
num_events: 10
timeframe:
  minutes: 3
query_key: src_ip
filter:
  - bool:
      should:
        - term:
            dest_port: 1883
        - term:
            dest_port: 8883
        - query_string:
            query: "alert.signature:(*MQTT* OR *mqtt*)"
            analyze_wildcard: true
      minimum_should_match: 1
  - bool:
      must_not:
        - terms:
            src_ip:
              - "172.18.0.6"
              - "172.18.0.9"
              - "172.18.0.19"
realert:
  minutes: 15
alert_subject: "[MEDIUM] MQTT Anomaly - {0} events from {1}"
alert_subject_args:
  - num_hits
  - src_ip
alert_text_type: alert_text_jinja
alert_text: |
  MQTT ANOMALY DETECTED
  Source     : {{ src_ip | default('N/A') }}:{{ src_port | default('N/A') }}
  Dest       : {{ dest_ip | default('N/A') }}:{{ dest_port | default('N/A') }}
  Events     : {{ num_hits }} in 3 minutes
  Timestamp  : {{ timestamp }}
  MITRE      : T1046 / T1071
  Kibana     : http://localhost:5601
alert:
  - email
  - slack
email:
  - garnitsaid01@gmail.com
slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC-Alert-Bot"
slack_emoji_override: ":satellite:"
slack_msg_color: "warning"
