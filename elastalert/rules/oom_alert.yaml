name: Out of Memory Event
type: frequency
index: soc-logs-enriched-*

num_events: 5
timeframe:
  minutes: 10

filter:
  - query:
      query_string:
        query: 'rule.id:5108'

alert:
  - slack
  - hivealerter

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_msg_color: warning

alert_text: "OOM detected on {0} - {1} events in 10 min"
alert_text_args:
  - agent.name
  - num_matches


alert_subject: "SOC - OOM Alert: {0}"
alert_subject_args:
  - agent.name
realert:
  minutes: 120


hive_connection:
  hive_host: http://thehive
  hive_port: 9000
  hive_apikey: "qaU5mFxE64fL+5yihYHoqA68J5yeJoEg"
hive_alert_config:
  title: "{match[rule.description]}"
  type: "external"
  source: "elastalert"
  description: "Detected by ElastAlert rule\n\nIndex: {rule[index]}"
  severity: 2
  tags: ["soc-alert", "elastalert"]
