<ossec_config>
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <email_notification>no</email_notification>
  </global>
  <rules>
    <include>rules_config.xml</include>
    <include>pci_dss_rules.xml</include>
    <include>gdpr_rules.xml</include>
    <include>general_rules.xml</include>
  </rules>
  <syscheck>
    <disabled>yes</disabled>
  </syscheck>
  <rootcheck>
    <disabled>yes</disabled>
  </rootcheck>
  <sca>
    <enabled>no</enabled>
  </sca>
  <wodle>
    <syscollector>
      <disabled>yes</disabled>
    </syscollector>
  </wodle>
  <auth>
    <disabled>yes</disabled>
  </auth>
  <vulnerability-detector>
    <enabled>no</enabled>
  </vulnerability-detector>
  <indexer>
    <enabled>yes</enabled>
    <hosts>http://elasticsearch:9200</hosts>
    <username>elastic</username>
    <password>SOCstack2026!</password>
    <ssl><enabled>no</enabled></ssl>
  </indexer>
  <osquery>
    <disabled>yes</disabled>
  </osquery>
</ossec_config>
