name: "🎯 MISP IOC Match — Threat Intel"
type: any
index: suricata-alerts-*
realert:
  hours: 2
query_key: src_ip
filter:
- query:
    bool:
      must:
      - exists:
          field: misp_event_id

alert:
- slack
alert_text_type: alert_text_only
alert_text: |
  🎯 *MISP Threat Intel Match*
  `THREAT INTELLIGENCE / IOC Hit`

  🕐 `{0}`
  📋 Rule: {1}  Severity: {2}

  🔴 Source  {4} : {5}
  🔵 Target  {6} : {7}
  📡 {8}  via  {9}

  ⚠️  Known Bad Actor — Investigate Now
  📊 http://localhost:5601
alert_text_args:
- "@timestamp"
- alert.signature
- alert.severity
- alert.category
- src_ip
- src_port
- dest_ip
- dest_port
- proto
- in_iface

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC Alerts"
slack_icon_emoji: ":red_circle:"
slack_msg_color: danger
