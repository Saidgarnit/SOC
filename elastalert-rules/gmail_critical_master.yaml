name: "📧 CRITICAL — Gmail Notification"
type: any
index: .ds-wazuh-alerts-4.x-*
realert:
  minutes: 30
filter:
- range:
    rule.level:
      gte: 12

alert:
- email
email:
- "garnitsaid01@gmail.com"
from_addr: "garnitsaid01@gmail.com"
smtp_host: "smtp.gmail.com"
smtp_port: 587
smtp_ssl: false
smtp_starttls: true
smtp_auth_file: "/opt/elastalert/smtp_auth.yaml"
alert_text_type: alert_text_only
alert_text: |
  CRITICAL SECURITY ALERT
  ========================
  Time        : {0}
  Host        : {1}  ({2})
  Level       : {3}  |  Rule: {4}
  Description : {5}

  MITRE ATT&CK
  Tactic    : {6}
  Technique : {7}
  ID        : {8}

  Network
  Attacker  : {9}
  User      : {10}

  Kibana: http://localhost:5601
alert_text_args:
- "@timestamp"
- agent.name
- agent.ip
- rule.level
- rule.id
- rule.description
- rule.mitre.tactic
- rule.mitre.technique
- rule.mitre.id
- data.srcip
- data.dstuser
