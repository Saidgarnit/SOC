name: "🕷️  Web Attack — Wazuh"
type: any
index: .ds-wazuh-alerts-4.x-*
realert:
  minutes: 20
query_key: agent.name
filter:
- query:
    bool:
      must:
      - terms:
          rule.groups:
          - web
      - range:
          rule.level:
            gte: 6

alert:
- slack
alert_text_type: alert_text_only
alert_text: |
  🕷️  *Web Attack Detected*
  `WAZUH / Web Application`

  🕐 `{0}`
  🖥️  Host: {1}  ({2})
  📋 Level: {3}  Rule: {4}
  📝 {5}

  🔴 Attacker: {9}

  🎯 MITRE: {8} — {6} / {7}
  📊 http://localhost:5601
alert_text_args:
- "@timestamp"
- agent.name
- agent.ip
- rule.level
- rule.id
- rule.description
- rule.mitre.tactic
- rule.mitre.technique
- rule.mitre.id
- data.srcip

slack_webhook_url: "https://hooks.slack.com/services/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"
slack_username_override: "SOC Alerts"
slack_icon_emoji: ":spider_web:"
slack_msg_color: danger
