<ossec_config>
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <agents_disconnection_time>10m</agents_disconnection_time>
    <agents_disconnection_alert_time>0</agents_disconnection_alert_time>
  </global>
  <alerts>
    <log_alert_level>3</log_alert_level>
    <email_alert_level>12</email_alert_level>
  </alerts>
  <logging>
    <log_format>plain</log_format>
  </logging>
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <purge>yes</purge>
    <use_password>no</use_password>
    <ssl_verify_host>no</ssl_verify_host>
    <ssl_manager_cert>etc/sslmanager.cert</ssl_manager_cert>
    <ssl_manager_key>etc/sslmanager.key</ssl_manager_key>
    <ssl_auto_negotiate>no</ssl_auto_negotiate>
  </auth>
  <cluster>
    <name>wazuh</name>
    <node_name>master-node</node_name>
    <node_type>master</node_type>
    <key>c98b62a9b0469c9408abf9e48f55e5b2</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes><node>master-node</node></nodes>
    <hidden>no</hidden>
    <disabled>yes</disabled>
  </cluster>
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>
  <localfile>
    <log_format>command</log_format>
    <command>df -P</command>
    <frequency>360</frequency>
  </localfile>
  <integration>
    <name>slack</name>
    <hook_url>https://hooks.slack.com/services/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</hook_url>
    <alert_format>json</alert_format>
    <level>12</level>
  </integration>
  <command>
    <name>ar-block-notify</name>
    <executable>ar-block-notify</executable>
    <timeout_allowed>yes</timeout_allowed>
  </command>
  <active-response>
    <command>ar-block-notify</command>
    <location>server</location>
    <rules_id>5712,5763,5720,5551</rules_id>
    <timeout>3600</timeout>
  </active-response>
  <command>
    <name>ar-kill-notify</name>
    <executable>ar-kill-notify</executable>
    <timeout_allowed>no</timeout_allowed>
  </command>
  <active-response>
    <command>ar-kill-notify</command>
    <location>local</location>
    <rules_group>attack,exploit,web_attack</rules_group>
  </active-response>
</ossec_config>
