<?xml version="1.0" encoding="UTF-8"?>
<!-- ============================================================
     Wazuh Shared Agent Configuration
     ============================================================
     Deployed to ALL agents from the manager via the shared group.
     Place at: wazuh/config/shared/default/agent.conf
     Mounted into wazuh-manager container at:
       /var/ossec/etc/shared/default/agent.conf

     This file REPLACES the docker cp workaround in start-soc.sh.
     ============================================================ -->

<agent_config>

  <!-- ── Buffer settings ─────────────────────────────────── -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ── Log collection: auth / syslog ───────────────────── -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <!-- ── Log collection: security / audit ────────────────── -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- ── Log collection: web server logs (if present) ────── -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <!-- ── Rootcheck ────────────────────────────────────────── -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
    <rootkit_files>etc/shared/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>etc/shared/rootkit_trojans.txt</rootkit_trojans>
  </rootcheck>

  <!-- ── File Integrity Monitoring ───────────────────────── -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Critical directories to monitor -->
    <directories check_all="yes" realtime="yes">/etc</directories>
    <directories check_all="yes" realtime="yes">/usr/bin</directories>
    <directories check_all="yes" realtime="yes">/usr/sbin</directories>
    <directories check_all="yes" realtime="yes">/bin</directories>
    <directories check_all="yes" realtime="yes">/sbin</directories>

    <!-- Ignore frequently changing files -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/mnttab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/resolv.conf</ignore>
  </syscheck>

  <!-- ── OpenSCAP (skip if not installed) ─────────────────── -->
  <wodle name="open-scap">
    <disabled>yes</disabled>
  </wodle>

  <!-- ── CIS-CAT (skip if not installed) ─────────────────── -->
  <wodle name="cis-cat">
    <disabled>yes</disabled>
  </wodle>

  <!-- ── Vulnerability detector ───────────────────────────── -->
  <wodle name="vulnerability-detector">
    <disabled>no</disabled>
    <interval>5m</interval>
    <run_on_start>yes</run_on_start>
  </wodle>

  <!-- ── Active Response ─────────────────────────────────── -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

</agent_config>

<agent_config name="victim-dns">
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/named/queries.log</location>
  </localfile>
</agent_config>
