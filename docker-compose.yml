services:

  # ============================================================
  # ELASTICSEARCH
  # FIX: Added ELASTIC_PASSWORD env var, healthcheck uses ${var}
  #      Added deploy.resources memory limit
  # ============================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=${ELASTIC_HTTP_SSL_ENABLED:-false}
      - xpack.security.http.ssl.key=${ELASTIC_HTTP_SSL_KEY}
      - xpack.security.http.ssl.certificate=${ELASTIC_HTTP_SSL_CERT}
      - xpack.security.http.ssl.certificate_authorities=${ELASTIC_HTTP_SSL_CA}
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms1g -Xmx1g}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - 127.0.0.1:9200:9200
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ./certs/elasticsearch:/usr/share/elasticsearch/config/certs:ro
    networks:
      - soc-core
    deploy:
      resources:
        limits:
          memory: ${ELASTICSEARCH_MEM_LIMIT:-4g}
        reservations:
          memory: 1g
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ "${ELASTIC_HTTP_SSL_ENABLED:-false}" = "true" ]; then
            curl -sf -k -u elastic:${ELASTIC_PASSWORD} https://localhost:9200/_cluster/health | grep -vq '"status":"red"';
          else
            curl -sf -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -vq '"status":"red"';
          fi
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ============================================================
  # ELASTICSEARCH INIT
  # NEW: Runs once after ES is healthy.
  #      Sets password, creates Kibana token, applies index
  #      templates with replicas=0, retries failed shards.
  # ============================================================
  elasticsearch-init:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch-init
    restart: "no"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_HTTP_SSL_ENABLED=${ELASTIC_HTTP_SSL_ENABLED:-false}
    volumes:
      - ./elasticsearch/init-es.sh:/init-es.sh:ro
      - ./elasticsearch:/output
    command: ["/bin/bash", "/init-es.sh"]
    networks:
      - soc-core

  # ============================================================
  # OPENCTI
  # FIX: Token + password read from .env
  # ============================================================
  opencti:
    image: opencti/platform:6.0.5
    container_name: opencti
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: ${OPENCTI_MEM_LIMIT:-512M}
    restart: unless-stopped
    ports:
      - 127.0.0.1:3000:8080
    environment:
      - APP__ADMIN__EMAIL=${OPENCTI_ADMIN_EMAIL}
      - APP__ADMIN__PASSWORD=${OPENCTI_ADMIN_PASSWORD}
      - APP__ADMIN__TOKEN=${OPENCTI_ADMIN_TOKEN}
      - DATABASE__TYPE=elasticsearch
      - ELASTICSEARCH__URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      - ELASTICSEARCH__USERNAME=${ELASTIC_USERNAME}
      - ELASTICSEARCH__PASSWORD=${ELASTIC_PASSWORD}
      - ELASTICSEARCH__SSL_VERIFY=${ELASTICSEARCH_SSL_VERIFY:-false}
      - REDIS__HOSTNAME=opencti-redis
      - REDIS__PORT=6379
      - RABBITMQ__HOSTNAME=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USER=${RABBITMQ_USER}
      - RABBITMQ__PASSWORD=${RABBITMQ_PASSWORD}
      - MINIO__ENDPOINT=minio
      - MINIO__PORT=9000
      - MINIO__USE_SSL=false
      - MINIO__ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO__SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - APP__PORT=8080
      - APP__BASE_URL=${OPENCTI_BASE_URL:-http://localhost:3000}
    depends_on:
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - soc-core
      - soc-ti
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:8080/graphql > /dev/null 2>&1; [ $? -le 1 ] && exit 0 || exit 1
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 120s

  opencti-worker:
    image: opencti/worker:6.0.5
    container_name: opencti-worker
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 512M
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - WORKER_LOG_LEVEL=info
      - RABBITMQ__HOSTNAME=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USER=${RABBITMQ_USER}
      - RABBITMQ__PASSWORD=${RABBITMQ_PASSWORD}
      - MINIO__ENDPOINT=minio
      - MINIO__PORT=9000
      - MINIO__USE_SSL=false
      - MINIO__ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO__SECRET_KEY=${MINIO_ROOT_PASSWORD}
    depends_on:
      opencti:
        condition: service_healthy
    networks:
      - soc-ti

  connector-mitre:
    image: opencti/connector-mitre:6.0.5
    container_name: connector-mitre
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=80468305-6490-449e-990a-1150493630f4
      - CONNECTOR_TYPE=EXTERNAL_IMPORT
      - CONNECTOR_NAME=MITRE_ATTACK
      - CONNECTOR_SCOPE=identity,attack-pattern,course-of-action,intrusion-set,malware,tool,report
      - CONNECTOR_CONFIDENCE_LEVEL=15
      - MITRE_INTERVAL=7
    depends_on:
      opencti:
        condition: service_healthy
    networks:
      - soc-ti
    read_only: true
    tmpfs:
      - /tmp

  # ============================================================
  # WAZUH MANAGER
  # FIX: agent.conf mount changed from single file → directory
  #      Added healthcheck
  #      Credentials moved to .env
  # ============================================================
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.5
    container_name: wazuh-manager
    init: true
    volumes:
      - ./wazuh/wazuh-template.json:/etc/filebeat/wazuh-template.json
      - ./wazuh/init-dirs.sh:/init-dirs.sh:ro
      - ./wazuh/config/shared/default:/var/ossec/etc/shared/default:rw
      - ./wazuh/ossec.conf:/var/ossec/etc/ossec.conf
      - ./wazuh/logs:/var/ossec/logs
      - ./wazuh/0-wazuh-init:/etc/cont-init.d/0-wazuh-init
      - ./wazuh/0a-setup-filebeat:/etc/cont-init.d/0a-setup-filebeat
      - ./wazuh/filebeat-template.yml:/filebeat-template.yml:ro
    restart: unless-stopped
    ports:
      - 127.0.0.1:55000:55000
    environment:
      - INDEXER_URL=${WAZUH_INDEXER_URL:-http://elasticsearch:9200}
      - INDEXER_USERNAME=${ELASTIC_USERNAME}
      - INDEXER_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_USERNAME=${ELASTIC_USERNAME}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - WAZUH_API_USER=${WAZUH_API_USER}
      - WAZUH_API_PASSWORD=${WAZUH_API_PASSWORD}
    networks:
      - soc-core
    deploy:
      resources:
        limits:
          memory: ${WAZUH_MANAGER_MEM_LIMIT:-1g}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -sf -k -u ${WAZUH_API_USER}:${WAZUH_API_PASSWORD} -X POST https://localhost:55000/security/user/authenticate | grep -q 'token'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: filebeat
    user: root
    restart: unless-stopped
    environment:
      - ELASTIC_USERNAME=${ELASTIC_USERNAME}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./wazuh/logs:/var/ossec/logs:ro
      - /var/log/filebeat:/var/log/filebeat
      - ./suricata/logs:/var/log/suricata:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - soc-core
    command: filebeat -e -strict.perms=false

  # ============================================================
  # KIBANA
  # FIX: Removed stale SERVICEACCOUNTTOKEN
  #      Added basic auth (ELASTICSEARCH_USERNAME/PASSWORD)
  #      Added Fleet env vars (no more API call each boot)
  #      Encryption keys read from .env
  # ============================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: kibana
    restart: unless-stopped
    ports:
      - 127.0.0.1:5601:5601
    environment:
      - ELASTICSEARCH_HOSTS=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      - ELASTICSEARCH_USERNAME=${ELASTIC_USERNAME}
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTICSEARCH_SERVICEACCOUNTTOKEN=${KIBANA_SERVICE_TOKEN}
      - SERVER_SSL_ENABLED=${KIBANA_SERVER_SSL_ENABLED:-false}
      - SERVER_SSL_CERTIFICATE=${KIBANA_SERVER_SSL_CERT}
      - SERVER_SSL_KEY=${KIBANA_SERVER_SSL_KEY}
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY}
      - XPACK_FLEET_AGENTS_ELASTICSEARCH_HOSTS=["${ELASTICSEARCH_URL:-http://elasticsearch:9200}"]
      - XPACK_FLEET_AGENTS_FLEET_SERVER_HOSTS=["${FLEET_SERVER_HOST:-http://fleet-server:8220}"]
    volumes:
      - ./kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - soc-core
    deploy:
      resources:
        limits:
          memory: ${KIBANA_MEM_LIMIT:-1g}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -sf http://localhost:5601/api/status | grep -q 'available' || curl -sf http://localhost:5601/api/status | grep -q 'degraded'
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ============================================================
  # LOGSTASH
  # FIX: Credentials from .env, added memory limit
  # NOTE: Also set sincedb_path => "/dev/null" in your
  #       logstash/pipeline/*.conf file inputs
  # ============================================================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: logstash
    user: root
    restart: unless-stopped
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
      - XPACK_MONITORING_ENABLED=false
      - LOGSTASH_PIPELINE_WORKERS=${LOGSTASH_PIPELINE_WORKERS:-2}
      - LOGSTASH_QUEUE_TYPE=${LOGSTASH_QUEUE_TYPE:-persisted}
      - LOGSTASH_QUEUE_MAX_BYTES=${LOGSTASH_QUEUE_MAX_BYTES:-1gb}
      - LOGSTASH_QUEUE_CHECKPOINT_WRITES=${LOGSTASH_QUEUE_CHECKPOINT_WRITES:-1024}
      - ELASTIC_USERNAME=${ELASTIC_USERNAME}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - MISP_IOC_DICTIONARY=/usr/share/logstash/misp_cache/misp_iocs.json
    volumes:
      - ./logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./suricata/logs:/var/log/suricata:ro
      - ./logstash/geoip:/usr/share/logstash/geoip:ro
      - ./threat-intelligence/cache:/usr/share/logstash/misp_cache:ro
      - logstash_data:/usr/share/logstash/data
    ports:
      - 127.0.0.1:5000:5000/tcp
      - 127.0.0.1:5001:5001/udp
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - soc-core
    deploy:
      resources:
        limits:
          memory: ${LOGSTASH_MEM_LIMIT:-1g}
    healthcheck:
      test:
        - CMD-SHELL
        - curl -sf http://localhost:9600/_node/pipelines > /dev/null
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================
  # MISP
  # FIX: Added healthcheck (300s start_period — MISP needs ~10min)
  #      Added healthcheck.sh volume mount
  #      Added memory limit
  # ============================================================
  misp:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    container_name: misp
    restart: unless-stopped
    ports:
      - 127.0.0.1:9001:80
      - 127.0.0.1:9002:443
    environment:
      - MYSQL_HOST=misp-db
      - MYSQL_USER=${MISP_DB_USER:-misp}
      - MYSQL_PASSWORD=${MISP_DB_PASSWORD}
      - MYSQL_DATABASE=${MISP_DB_NAME:-misp}
      - REDIS_HOST=misp-redis
      - REDIS_PASSWORD=${MISP_REDIS_PASSWORD}
      - ENABLE_REDIS_EMPTY_PASSWORD=${MISP_REDIS_EMPTY_PASSWORD:-true}
      - PHP_SESSION_DEFAULTS=redis
      - BASE_URL=${MISP_BASE_URL:-http://localhost:9001}
      - DISABLE_SSL_REDIRECT=${MISP_DISABLE_SSL_REDIRECT:-true}
      - PHP_SESSION_COOKIE_SECURE=${MISP_COOKIE_SECURE:-false}
    depends_on:
      misp-db:
        condition: service_healthy
    volumes:
      - misp-app:/var/www/MISP
      - ./misp/healthcheck.sh:/healthcheck.sh:ro
    networks:
      - soc-ti
    deploy:
      resources:
        limits:
          memory: ${MISP_MEM_LIMIT:-2g}
    healthcheck:
      test: ["CMD", "/bin/bash", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  misp-db:
    image: mysql:8.0
    container_name: misp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MISP_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MISP_DB_NAME:-misp}
      MYSQL_USER: ${MISP_DB_USER:-misp}
      MYSQL_PASSWORD: ${MISP_DB_PASSWORD}
    volumes:
      - misp-db-data:/var/lib/mysql
    networks:
      - soc-ti
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h localhost -uroot -p${MISP_DB_ROOT_PASSWORD} --silent
      interval: 10s
      retries: 5

  misp-redis:
    image: redis:7-alpine
    container_name: misp-redis
    restart: unless-stopped
    networks:
      - soc-ti

  suricata:
    image: jasonish/suricata:latest
    container_name: suricata
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata/rules:/etc/suricata/rules:ro
      - ./suricata/logs:/var/log/suricata:rw
      - ./suricata/threshold.conf:/etc/suricata/threshold.conf:ro
      - ./suricata/config/suricata.yaml:/etc/suricata/suricata.yaml:ro
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "2"
    command: -i ${SURICATA_INTERFACE:-eth0} --set default-rule-path=/var/lib/suricata/rules -s /var/lib/suricata/rules/suricata.rules
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - soc-core
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    networks:
      - soc-ti
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      interval: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    networks:
      - soc-ti
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9000/minio/health/live
      interval: 10s
      retries: 5

  memcached:
    image: memcached:alpine
    container_name: memcached
    restart: unless-stopped
    networks:
      - soc-ti

  # ============================================================
  # ELASTALERT
  # FIX: Added ES auth + SLACK_WEBHOOK_URL from .env
  #      Added memory limit
  # ============================================================
  elastalert:
    image: jertel/elastalert2:latest
    container_name: elastalert
    dns:
      - 8.8.8.8
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/opt/elastalert/entrypoint.sh"]
    command:
      - --verbose
      - --config
      - /opt/elastalert/config.yaml
    environment:
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - ELASTICSEARCH_USERNAME=${ELASTIC_USERNAME}
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
    volumes:
      - ./elastalert/config.yaml.template:/opt/elastalert/config.yaml.template:ro
      - ./elastalert/smtp_auth.yaml.template:/opt/elastalert/smtp_auth.yaml.template:ro
      - ./elastalert/rules:/opt/elastalert/rules:ro
      - ./elastalert/render_config.py:/opt/elastalert/render_config.py:ro
      - ./elastalert/entrypoint.sh:/opt/elastalert/entrypoint.sh:ro
      - ./elastalert/logs:/opt/elastalert/logs
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - soc-core
    deploy:
      resources:
        limits:
          memory: ${ELASTALERT_MEM_LIMIT:-256m}

  yara-scanner:
    build: ./yara/scanner
    container_name: yara-scanner
    restart: unless-stopped
    volumes:
      - ./yara/samples:/samples
      - yara-dvwa:/victims/dvwa:ro
      - yara-ubuntu-www:/victims/ubuntu-www:ro
      - yara-ubuntu-tmp:/victims/ubuntu-tmp:ro
      - yara-ftp:/victims/ftp:ro
    networks:
      - soc-core
    command:
      - bash
      - -c
      - while true; do python3 /scanner/scan.py || echo "YARA scan failed, retrying..."; sleep 10; done

  # ============================================================
  # VT-ENRICHER
  # FIX: ES credentials from .env
  # ============================================================
  vt-enricher:
    build:
      context: ./threat-intelligence
      dockerfile: Dockerfile
    image: vt-enricher:local
    container_name: vt-enricher
    restart: unless-stopped
    environment:
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - ES_USER=${ELASTIC_USERNAME}
      - ES_PASS=${ELASTIC_PASSWORD}
      - ES_HOST=http://elasticsearch:9200
      - ES_USERNAME=${ELASTIC_USERNAME}
      - ES_PASSWORD=${ELASTIC_PASSWORD}
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - soc-core
    read_only: true
    tmpfs:
      - /tmp

  misp-ioc-sync:
    image: vt-enricher:local
    container_name: misp-ioc-sync
    restart: unless-stopped
    command: ["python3", "-u", "/app/misp_ioc_sync.py"]
    environment:
      - MISP_URL=${MISP_URL:-http://misp}
      - MISP_API_KEY=${MISP_API_KEY}
      - OUTPUT_PATH=/data/misp_iocs.json
      - SYNC_INTERVAL=600
      - MISP_SSL_VERIFY=${MISP_SSL_VERIFY:-false}
    volumes:
      - ./threat-intelligence/cache:/data
    depends_on:
      misp:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - soc-ti

  opencti-redis:
    image: redis:7-alpine
    container_name: opencti-redis
    restart: unless-stopped
    networks:
      - soc-ti

  # ============================================================
  # CONNECTOR-MISP
  # FIX: memory limit added (was uncapped → OOM → exit 143)
  #      depends_on misp: service_started → service_healthy
  #      MISP_KEY moved to .env as ${MISP_API_KEY}
  # ============================================================
  connector-misp:
    image: opencti/connector-misp:6.0.5
    container_name: connector-misp
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=misp-connector-001
      - CONNECTOR_TYPE=EXTERNAL_IMPORT
      - CONNECTOR_NAME=MISP
      - CONNECTOR_SCOPE=misp-galaxy,misp-attribute
      - CONNECTOR_CONFIDENCE_LEVEL=75
      - CONNECTOR_LOG_LEVEL=info
      - MISP_URL=${MISP_URL:-http://misp}
      - MISP_KEY=${MISP_API_KEY}
      - MISP_SSL=${MISP_SSL_VERIFY:-false}
      - MISP_FEED_MODE=false
      - MISP_DATETIME_ATTRIBUTE=timestamp
      - MISP_CREATE_REPORTS=true
      - MISP_REPORT_TYPE=misp-event
      - MISP_CREATE_INDICATORS=true
      - MISP_CREATE_OBSERVABLES=true
      - MISP_IMPORT_FROM_DATE=2026-01-01
      - MISP_INTERVAL=5
    depends_on:
      opencti:
        condition: service_healthy
      misp:
        condition: service_healthy
    networks:
      - soc-ti
    deploy:
      resources:
        limits:
          memory: ${MISP_CONNECTOR_MEM_LIMIT:-512m}
        reservations:
          memory: 256m
    read_only: true
    tmpfs:
      - /tmp

volumes:
  yara-dvwa:
    external: true
  yara-ubuntu-www:
    external: true
  yara-ubuntu-tmp:
    external: true
  yara-ftp:
    external: true
  wazuh_alerts:
  es_data:
  logstash_data:
  wazuh_data:
  misp-db-data:
  misp-app:

networks:
  soc-core:
    name: soc-core
    driver: bridge
  soc-ti:
    name: soc-ti
    driver: bridge
