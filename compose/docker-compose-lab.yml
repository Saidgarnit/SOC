networks:
  soc-net:
    external: true
    name: soc-stack_soc-net
services:
  fleet-server:
    container_name: fleet-server
    environment:
    - FLEET_SERVER_ENABLE=1
    - FLEET_SERVER_ELASTICSEARCH_HOST=http://elasticsearch:9200
    - FLEET_SERVER_ELASTICSEARCH_USERNAME=elastic
    - FLEET_SERVER_ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
    - FLEET_SERVER_SERVICE_TOKEN=AAEAAWVsYXN0aWMvZmxlZXQtc2VydmVyL2ZsZWV0LXRva2VuLTE6ZEJVUy10d1ZUVy02d2ZYY0FkNmZoUQ
    - FLEET_SERVER_POLICY_ID=fleet-server-policy
    - FLEET_SERVER_INSECURE_HTTP=1
    - FLEET_SERVER_HOST=0.0.0.0
    hostname: fleet-server
    image: docker.elastic.co/elastic-agent/elastic-agent:8.13.0
    networks:
    - soc-net
    ports:
    - 8220:8220
    restart: unless-stopped
  kali-attacker:
    build:
      context: ./lab/kali-attacker
      dockerfile: Dockerfile
    cap_add:
    - NET_ADMIN
    - NET_RAW
    command: bash -c 'tail -f /dev/null'
    container_name: kali-attacker
    hostname: kali-attacker
    image: kali-attacker-persistent:latest
    networks:
      soc-net: null
    restart: unless-stopped
  victim-database:
    container_name: victim-database
    deploy:
      resources:
        limits:
          memory: 512m
    hostname: victim-database
    image: soc-stack-victim-database
    networks:
    - soc-net
    ports:
    - 3306:3306
    restart: unless-stopped
  victim-dns:
    container_name: victim-dns
    deploy:
      resources:
        limits:
          memory: 256m
    hostname: victim-dns
    image: soc-stack-victim-dns
    networks:
    - soc-net
    restart: unless-stopped
  victim-dvwa:
    container_name: victim-dvwa
    deploy:
      resources:
        limits:
          memory: 256m
    hostname: victim-dvwa
    image: victim-dvwa-img:latest
    networks:
    - soc-net
    ports:
    - 8890:80
    restart: unless-stopped
  victim-ftp:
    container_name: victim-ftp
    deploy:
      resources:
        limits:
          memory: 256m
    hostname: victim-ftp
    image: soc-stack-victim-ftp
    networks:
    - soc-net
    ports:
    - '2124:21'
    - 21100-21110:21100-21110
    restart: unless-stopped
  victim-iot:
    container_name: victim-iot
    cpus: '4.0'
    deploy:
      resources:
        limits:
          memory: 256m
    hostname: victim-iot
    image: soc-stack-victim-iot
    mem_limit: 512m
    networks:
    - soc-net
    ports:
    - 1883:1883
    - 8891:8080
    restart: unless-stopped
  victim-jenkins:
    container_name: victim-jenkins
    deploy:
      resources:
        limits:
          memory: 768m
    hostname: victim-jenkins
    image: soc-stack-victim-jenkins
    networks:
    - soc-net
    ports:
    - 9090:8080
    restart: unless-stopped
  victim-mail:
    container_name: victim-mail
    deploy:
      resources:
        limits:
          memory: 256m
    hostname: victim-mail
    image: soc-stack-victim-mail
    networks:
    - soc-net
    ports:
    - '2525:25'
    - 1143:143
    restart: unless-stopped
  victim-metasploitable:
    command: /bin/bash -c "while true; do sleep 86400; done"
    container_name: victim-metasploitable
    deploy:
      resources:
        limits:
          memory: 256m
    hostname: victim-metasploitable
    image: tleemcjr/metasploitable2
    networks:
    - soc-net
    ports:
    - '2223:22'
    - 8889:80
    - '2122:21'
    restart: unless-stopped
  victim-ubuntu:
    container_name: victim-ubuntu
    deploy:
      resources:
        limits:
          memory: 512m
    hostname: victim-ubuntu
    image: soc-stack-victim-ubuntu
    networks:
    - soc-net
    ports:
    - '2222:22'
    - 8888:80
    - '2121:21'
    restart: unless-stopped
  victim-webapi:
    container_name: victim-webapi
    deploy:
      resources:
        limits:
          memory: 256m
    hostname: victim-webapi
    image: raesene/bwapp
    networks:
    - soc-net
    ports:
    - 8892:80
    restart: unless-stopped
  victim-windows:
    container_name: victim-windows
    deploy:
      resources:
        limits:
          memory: 512m
    environment:
    - FLEET_ENROLLMENT_TOKEN=T2szMFlKNEJBNGlWMHNLaXBrTkE6ZkR5bldidENRVFdRWEJmckhXVnRYdw==
    - FLEET_URL=https://fleet-server:8220
    - FLEET_INSECURE=true
    hostname: victim-windows
    image: soc-stack-victim-windows:latest
    networks:
    - soc-net
    ports:
    - 139:139
    - 445:445
    restart: unless-stopped
version: '3.8'
