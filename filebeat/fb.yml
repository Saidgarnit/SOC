filebeat.inputs:
  - type: filestream
    id: wazuh-alerts
    enabled: true
    paths:
      - /var/ossec/logs/alerts/alerts.json
    parsers:
      - ndjson:
          keys_under_root: true
          overwrite_keys: true
          add_error_key: true
          expand_keys: true
    fields:
      log_source: wazuh
    fields_under_root: true
    prospector.scanner.check_interval: 5s

  - type: log
    enabled: true
    paths:
      - /var/log/suricata/eve.json
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      log_source: suricata
    fields_under_root: true

setup.template.enabled: false
setup.ilm.enabled: false

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  username: "elastic"
  password: "Kjd9r43ANUymjjcba0M6"
  indices:
    - index: "wazuh-alerts-4.x-%{+yyyy.MM.dd}"
      when.equals:
        log_source: wazuh
    - index: "suricata-alerts-%{+yyyy.MM.dd}"
      when.equals:
        log_source: suricata

logging.level: info
logging.to_stderr: true
