services:
  fleet-server:
    image: docker.elastic.co/elastic-agent/elastic-agent:8.13.0
    container_name: fleet-server
    hostname: fleet-server
    user: root
    mem_limit: 512m
    environment:
      - FLEET_SERVER_ENABLE=1
      - FLEET_SERVER_ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - FLEET_SERVER_ELASTICSEARCH_USERNAME=${ELASTIC_USERNAME}
      - FLEET_SERVER_ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - FLEET_SERVER_ELASTICSEARCH_CA=/usr/share/elastic-agent/config/certs/ca/ca.crt
      - FLEET_SERVER_SERVICE_TOKEN=${FLEET_SERVER_SERVICE_TOKEN}
      - FLEET_SERVER_POLICY_ID=${FLEET_SERVER_POLICY_ID}
      - FLEET_SERVER_HOST=${FLEET_SERVER_HOST}
      - FLEET_URL=${FLEET_URL}
      - FLEET_SERVER_CERT=/usr/share/elastic-agent/config/certs/certs/fleet-server.crt
      - FLEET_SERVER_CERT_KEY=/usr/share/elastic-agent/config/certs/certs/fleet-server.key
      - FLEET_SERVER_INSECURE_HTTP=0
    ports:
      - "8220:8220"
    networks:
      - soc-management
      - soc-internal
      - soc-victim-range
    restart: unless-stopped
    volumes:
      - fleet-server-data:/usr/share/elastic-agent
      - es-certs:/usr/share/elastic-agent/config/certs:ro

  victim-ubuntu:
    build:
      context: ./lab/victim-ubuntu
      dockerfile: Dockerfile
    container_name: victim-ubuntu
    mem_limit: 400m
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
    hostname: victim-ubuntu
    networks:
      - soc-victim-range
    ports:
      - "2222:22"
      - "8888:80"
      - "2121:21"
    environment:
      - FLEET_ENROLLMENT_TOKEN=${FLEET_ENROLLMENT_TOKEN}
      - FLEET_URL=${FLEET_URL}
      - FLEET_CA_CERT=/etc/elastic-agent/certs/ca/ca.crt
    restart: unless-stopped
    volumes:
      - yara-ubuntu-www:/var/www/html
      - yara-ubuntu-tmp:/tmp
      - elastic-agent-ubuntu:/opt/elastic-agent
      - es-certs:/etc/elastic-agent/certs:ro

  victim-metasploitable:
    build:
      context: .
      dockerfile: lab/victim-metasploitable/Dockerfile
    container_name: victim-metasploitable
    mem_limit: 400m
    hostname: victim-metasploitable
    tty: true
    stdin_open: true
    networks:
      - soc-victim-range
    ports:
      - "2223:22"
      - "8889:80"
      - "2122:21"
    restart: unless-stopped
    volumes:
      - ./lab/metasploitable-syslog.conf:/etc/syslog.conf:ro
    labels:
      wazuh.skip: i386-incompatible

  victim-dvwa:
    image: victim-dvwa-img:latest
    container_name: victim-dvwa
    mem_limit: 400m
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
    hostname: victim-dvwa
    networks:
      - soc-victim-range
    ports:
      - "8890:80"
    environment:
      - FLEET_ENROLLMENT_TOKEN=${FLEET_ENROLLMENT_TOKEN}
      - FLEET_URL=${FLEET_URL}
      - FLEET_CA_CERT=/etc/elastic-agent/certs/ca/ca.crt
    restart: unless-stopped
    volumes:
      - elastic-agent-dvwa:/opt/elastic-agent
      - ./lab/victim-dvwa/entrypoint.sh:/entrypoint.sh:ro
      - yara-dvwa:/var/www/html
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
      - es-certs:/etc/elastic-agent/certs:ro

  victim-iot:
    build:
      context: ./lab/victim-iot
      dockerfile: Dockerfile
    container_name: victim-iot
    mem_limit: 400m
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
    hostname: victim-iot
    networks:
      - soc-victim-range
    ports:
      - "1883:1883"
      - "8891:8080"
    environment:
      - FLEET_ENROLLMENT_TOKEN=${FLEET_ENROLLMENT_TOKEN}
      - FLEET_URL=${FLEET_URL}
      - FLEET_CA_CERT=/etc/elastic-agent/certs/ca/ca.crt
    restart: unless-stopped
    volumes:
      - elastic-agent-iot:/opt/elastic-agent
      - ./lab/victim-iot/entrypoint.sh:/entrypoint.sh:ro
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
      - es-certs:/etc/elastic-agent/certs:ro

  kali-attacker:
    image: kali-attacker-persistent:latest
    container_name: kali-attacker
    hostname: kali-attacker
    networks:
      - soc-victim-range
    stdin_open: true
    tty: true
    command: bash -c "tail -f /dev/null"
    restart: unless-stopped

  victim-database:
    build:
      context: ./lab/victim-database
      dockerfile: Dockerfile
    container_name: victim-database
    mem_limit: 512m
    hostname: victim-database
    networks:
      - soc-victim-range
    ports:
      - "3306:3306"
    restart: unless-stopped
    volumes:
      - elastic-agent-database:/opt/elastic-agent
      - ./lab/victim-database/entrypoint.sh:/entrypoint.sh:ro
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
      - es-certs:/etc/elastic-agent/certs:ro
    environment:
      - FLEET_ENROLLMENT_TOKEN=${FLEET_ENROLLMENT_TOKEN}
      - FLEET_URL=${FLEET_URL}
      - FLEET_CA_CERT=/etc/elastic-agent/certs/ca/ca.crt

  victim-mail:
    build:
      context: ./lab/victim-mail
      dockerfile: Dockerfile
    container_name: victim-mail
    mem_limit: 400m
    hostname: victim-mail
    networks:
      - soc-victim-range
    ports:
      - "2525:25"
      - "1143:143"
    restart: unless-stopped
    volumes:
      - elastic-agent-mail:/opt/elastic-agent
      - ./lab/victim-mail/entrypoint.sh:/entrypoint.sh:ro
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
      - es-certs:/etc/elastic-agent/certs:ro
    environment:
      - FLEET_ENROLLMENT_TOKEN=${FLEET_ENROLLMENT_TOKEN}
      - FLEET_URL=${FLEET_URL}
      - FLEET_CA_CERT=/etc/elastic-agent/certs/ca/ca.crt

  victim-dns:
    build:
      context: ./lab/victim-dns
      dockerfile: Dockerfile
    container_name: victim-dns
    mem_limit: 400m
    hostname: victim-dns
    networks:
      - soc-victim-range
    restart: unless-stopped
    volumes:
      - elastic-agent-dns:/opt/elastic-agent
      - ./lab/victim-dns/entrypoint.sh:/entrypoint.sh:ro
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
      - es-certs:/etc/elastic-agent/certs:ro
    environment:
      - FLEET_ENROLLMENT_TOKEN=${FLEET_ENROLLMENT_TOKEN}
      - FLEET_URL=${FLEET_URL}
      - FLEET_CA_CERT=/etc/elastic-agent/certs/ca/ca.crt

  victim-jenkins:
    build:
      context: ./lab/victim-jenkins
      dockerfile: Dockerfile
    container_name: victim-jenkins
    mem_limit: 512m
    hostname: victim-jenkins
    networks:
      - soc-victim-range
    ports:
      - "9090:8080"
    restart: unless-stopped
    volumes:
      - elastic-agent-jenkins:/opt/elastic-agent
      - ./lab/victim-jenkins/entrypoint.sh:/entrypoint.sh:ro
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
      - es-certs:/etc/elastic-agent/certs:ro
    environment:
      - FLEET_ENROLLMENT_TOKEN=${FLEET_ENROLLMENT_TOKEN}
      - FLEET_URL=${FLEET_URL}
      - FLEET_CA_CERT=/etc/elastic-agent/certs/ca/ca.crt

  victim-ftp:
    image: fauria/vsftpd
    container_name: victim-ftp
    mem_limit: 400m
    hostname: victim-ftp
    environment:
      - FLEET_ENROLLMENT_TOKEN=${FLEET_ENROLLMENT_TOKEN}
      - FLEET_URL=${FLEET_URL}
      - FLEET_CA_CERT=/etc/elastic-agent/certs/ca/ca.crt
      - FTP_USER=${FTP_USER}
      - FTP_PASS=${FTP_PASS}
      - PASV_MIN_PORT=21100
      - PASV_MAX_PORT=21110
      - ANONYMOUS_ENABLE=YES
      - LOCAL_ENABLE=YES
      - WRITE_ENABLE=YES
    ports:
      - "2124:21"
      - "21100-21110:21100-21110"
    networks:
      - soc-victim-range
    restart: unless-stopped
    entrypoint:
      - /bin/bash
      - /entrypoint-ftp.sh
    volumes:
      - yara-ftp:/home/vsftpd
      - elastic-agent-ftp:/opt/elastic-agent
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
      - ./wazuh-agent/entrypoint-ftp.sh:/entrypoint-ftp.sh:ro
      - wazuh_ossec_ftp:/var/ossec
      - es-certs:/etc/elastic-agent/certs:ro

  victim-webapi:
    image: raesene/bwapp
    container_name: victim-webapi
    mem_limit: 512m
    hostname: victim-webapi
    environment:
      - FLEET_ENROLLMENT_TOKEN=${FLEET_ENROLLMENT_TOKEN}
      - FLEET_URL=${FLEET_URL}
      - FLEET_CA_CERT=/etc/elastic-agent/certs/ca/ca.crt
    ports:
      - "8892:80"
    networks:
      - soc-victim-range
    restart: unless-stopped
    entrypoint:
      - /bin/bash
      - /entrypoint-webapi.sh
    volumes:
      - victim_webapi_mysql:/var/lib/mysql
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
      - ./wazuh-agent/entrypoint-webapi.sh:/entrypoint-webapi.sh:ro
      - wazuh_ossec_webapi:/var/ossec
      - elastic-agent-webapi:/opt/elastic-agent
      - es-certs:/etc/elastic-agent/certs:ro

  victim-windows:
    build:
      context: ./lab/victim-windows
      dockerfile: Dockerfile
    container_name: victim-windows
    mem_limit: 400m
    hostname: victim-windows
    networks:
      - soc-victim-range
    ports:
      - "4445:445"
      - "1390:139"
    restart: unless-stopped
    volumes:
      - elastic-agent-windows:/opt/elastic-agent
      - ./lab/victim-windows/entrypoint.sh:/entrypoint.sh:ro
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
      - es-certs:/etc/elastic-agent/certs:ro
    environment:
      - FLEET_ENROLLMENT_TOKEN=${FLEET_ENROLLMENT_TOKEN}
      - FLEET_URL=${FLEET_URL}
      - FLEET_CA_CERT=/etc/elastic-agent/certs/ca/ca.crt

networks:
  soc-internal:
    external: true
    name: soc-stack_soc-internal
  soc-management:
    external: true
    name: soc-stack_soc-management
  soc-victim-range:
    external: true
    name: soc-stack_soc-victim-range

volumes:
  yara-dvwa:
    external: true
  yara-ubuntu-www:
    external: true
  yara-ubuntu-tmp:
    external: true
  yara-ftp:
  elastic-agent-ftp:
    external: true
  victim_webapi_mysql:
  elastic-agent-dvwa:
  elastic-agent-mail:
  elastic-agent-dns:
  elastic-agent-iot:
  elastic-agent-windows:
  elastic-agent-database:
  elastic-agent-jenkins:
  elastic-agent-webapi:
    external: true
  elastic-agent-ubuntu:
  fleet-server-data:
  wazuh_ossec_ftp:
    external: true
  wazuh_ossec_webapi:
    external: true
  es-certs:
    external: true
    name: soc-stack_es-certs
