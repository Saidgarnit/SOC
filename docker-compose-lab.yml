services:
  fleet-server:
    image: docker.elastic.co/elastic-agent/elastic-agent:8.13.0
    container_name: fleet-server
    hostname: fleet-server
    user: root
    environment:
      - FLEET_SERVER_ENABLE=1
      - FLEET_SERVER_ELASTICSEARCH_HOST=http://elasticsearch:9200
      - FLEET_SERVER_ELASTICSEARCH_USERNAME=${FLEET_SERVER_ELASTICSEARCH_USERNAME}
      - FLEET_SERVER_ELASTICSEARCH_PASSWORD=${FLEET_SERVER_ELASTICSEARCH_PASSWORD}
      - FLEET_SERVER_SERVICE_TOKEN=${FLEET_SERVER_SERVICE_TOKEN}
      - FLEET_SERVER_POLICY_ID=${FLEET_SERVER_POLICY_ID:-fleet-server-policy}
      - FLEET_SERVER_INSECURE_HTTP=1
      - FLEET_SERVER_HOST=${FLEET_SERVER_HOST:-0.0.0.0}
      - FLEET_URL=http://fleet-server:8220
    ports:
      - "127.0.0.1:8220:8220"
    networks:
      - soc-core
    restart: unless-stopped
  victim-ubuntu:
    build:
      context: ./lab/victim-ubuntu
      dockerfile: Dockerfile
    container_name: victim-ubuntu
    mem_limit: 400m
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
    hostname: victim-ubuntu
    networks:
      - soc-core
      - soc-victims
    ports:
      - "127.0.0.1:2222:22"
      - "127.0.0.1:8888:80"
      - "127.0.0.1:2121:21"
    environment:
      ELASTIC_TOKEN: ${ELASTIC_AGENT_ENROLLMENT_TOKEN}
    restart: unless-stopped
    volumes:
      - yara-ubuntu-www:/var/www/html
      - yara-ubuntu-tmp:/tmp
  victim-metasploitable:
    image: tleemcjr/metasploitable2
    container_name: victim-metasploitable
    mem_limit: 400m
    hostname: victim-metasploitable
    tty: true
    stdin_open: true
    networks:
      - soc-core
      - soc-victims
    ports:
      - "127.0.0.1:2223:22"
      - "127.0.0.1:8889:80"
      - "127.0.0.1:2122:21"
    restart: unless-stopped
    labels:
      wazuh.skip: i386-incompatible
  victim-dvwa:
    image: victim-dvwa-img:latest
    container_name: victim-dvwa
    mem_limit: 400m
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
    hostname: victim-dvwa
    networks:
      - soc-core
      - soc-victims
    ports:
      - "127.0.0.1:8890:80"
    environment:
      ELASTIC_TOKEN: ${ELASTIC_AGENT_ENROLLMENT_TOKEN}
    restart: unless-stopped
    volumes:
      - yara-dvwa:/var/www/html
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
  victim-iot:
    build:
      context: ./lab/victim-iot
      dockerfile: Dockerfile
    container_name: victim-iot
    mem_limit: 400m
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
      - NET_ADMIN
    security_opt:
      - seccomp:unconfined
    hostname: victim-iot
    networks:
      - soc-core
      - soc-victims
    ports:
      - "127.0.0.1:1883:1883"
      - "127.0.0.1:8891:8080"
    environment:
      ELASTIC_TOKEN: ${ELASTIC_AGENT_ENROLLMENT_TOKEN}
    restart: unless-stopped
    volumes:
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
  kali-attacker:
    image: kalilinux/kali-rolling
    container_name: kali-attacker
    hostname: kali-attacker
    networks:
      - soc-attack
      - soc-victims
    stdin_open: true
    tty: true
    command: bash -c "apt-get update -qq && apt-get install -y -qq nmap hydra curl netcat-openbsd nikto sqlmap 2>/dev/null; tail -f /dev/null"
    restart: unless-stopped
  victim-database:
    build:
      context: ./lab/victim-database
      dockerfile: Dockerfile
    container_name: victim-database
    mem_limit: 512m
    hostname: victim-database
    networks:
      - soc-core
      - soc-victims
    ports:
      - "127.0.0.1:3306:3306"
    restart: unless-stopped
    volumes:
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
  victim-mail:
    build:
      context: ./lab/victim-mail
      dockerfile: Dockerfile
    container_name: victim-mail
    mem_limit: 400m
    hostname: victim-mail
    networks:
      - soc-core
      - soc-victims
    ports:
      - "127.0.0.1:2525:25"
      - "127.0.0.1:1143:143"
    restart: unless-stopped
    volumes:
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
  victim-dns:
    build:
      context: ./lab/victim-dns
      dockerfile: Dockerfile
    container_name: victim-dns
    mem_limit: 400m
    hostname: victim-dns
    networks:
      - soc-core
      - soc-victims
    restart: unless-stopped
    volumes:
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
  victim-jenkins:
    build:
      context: ./lab/victim-jenkins
      dockerfile: Dockerfile
    container_name: victim-jenkins
    mem_limit: 512m
    hostname: victim-jenkins
    networks:
      - soc-core
      - soc-victims
    ports:
      - "127.0.0.1:9090:8080"
    restart: unless-stopped
    volumes:
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
  victim-ftp:
    image: fauria/vsftpd
    container_name: victim-ftp
    mem_limit: 400m
    hostname: victim-ftp
    environment:
      FTP_USER: ftpuser
      FTP_PASS: ${FTP_PASS:-password123}
      PASV_MIN_PORT: "21100"
      PASV_MAX_PORT: "21110"
      ANONYMOUS_ENABLE: "YES"
      LOCAL_ENABLE: "YES"
      WRITE_ENABLE: "YES"
    ports:
      - "127.0.0.1:2124:21"
      - "127.0.0.1:21100-21110:21100-21110"
    networks:
      - soc-core
      - soc-victims
    restart: unless-stopped
    volumes:
      - yara-ftp:/home/vsftpd
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
  victim-webapi:
    image: raesene/bwapp
    container_name: victim-webapi
    mem_limit: 512m
    hostname: victim-webapi
    ports:
      - "127.0.0.1:8892:80"
    networks:
      - soc-core
      - soc-victims
    restart: unless-stopped
    command: ["/run.sh"]
    volumes:
      - victim_webapi_mysql:/var/lib/mysql
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
  victim-windows:
    build:
      context: ./lab/victim-windows
      dockerfile: Dockerfile
    container_name: victim-windows
    mem_limit: 400m
    hostname: victim-windows
    networks:
      - soc-core
      - soc-victims
    ports:
      - "127.0.0.1:4445:445"
      - "127.0.0.1:1390:139"
    restart: unless-stopped
    volumes:
      - ./wazuh-agent/wazuh-watchdog.sh:/tmp/wazuh-watchdog.sh:ro
networks:
  soc-core:
    external: true
    name: soc-core
  soc-victims:
    name: soc-victims
    driver: bridge
  soc-attack:
    name: soc-attack
    driver: bridge
volumes:
  yara-dvwa:
    external: true
  yara-ubuntu-www:
    external: true
  yara-ubuntu-tmp:
    external: true
  yara-ftp:
    external: true
  victim_webapi_mysql:
