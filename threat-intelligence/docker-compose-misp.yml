services:
  # MISP MySQL Database
  misp-db:
    image: mysql:8.0
    container_name: misp-db
    environment:
      MYSQL_ROOT_PASSWORD: misp_root_password
      MYSQL_DATABASE: misp
      MYSQL_USER: misp
      MYSQL_PASSWORD: misp_password
    volumes:
      - misp-db-data:/var/lib/mysql
    networks:
      - soc-net
    restart: unless-stopped

  # MISP Redis Cache (set password to match what MISP/PHP expects)
  misp-redis:
    image: redis:7-alpine
    container_name: misp-redis
    command: ["redis-server", "--requirepass", "redispassword"]
    networks:
      - soc-net
    restart: unless-stopped

  # MISP Core
  misp:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    container_name: misp
    ports:
      - "80:80"
      - "443:443"
    environment:
      - MYSQL_HOST=misp-db
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp_password
      - MYSQL_DATABASE=misp
      - REDIS_HOST=misp-redis
      - MISP_ADMIN_EMAIL=admin@misp.local
      - MISP_ADMIN_PASSWORD=Admin@123
      - MISP_BASEURL=https://localhost
    depends_on:
      - misp-db
      - misp-redis
    volumes:
      - misp-tmp:/var/www/MISP/app/tmp
      - misp-files:/var/www/MISP/app/files
      - ./misp-nginx/98-fastcgi-host.conf:/etc/nginx/snippets/98-fastcgi-host.conf:ro
      - ./misp-nginx/includes-misp:/etc/nginx/includes/misp:ro
      - ./misp-nginx/misp443:/etc/nginx/sites-enabled/misp443:ro
    networks:
      - soc-net
    restart: unless-stopped

volumes:
  misp-db-data:
  misp-tmp:
  misp-files:

networks:
  soc-net:
    external: true
    name: soc-stack_soc-net
