services:
  # MISP MySQL Database
  misp-db:
    image: mysql:8.0
    container_name: misp-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MISP_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: misp
      MYSQL_USER: misp
      MYSQL_PASSWORD: ${MISP_DB_PASSWORD}
    volumes:
      - misp-db-data:/var/lib/mysql
    networks:
      - soc-internal
    restart: unless-stopped

  # MISP Redis Cache (set password to match what MISP/PHP expects)
  misp-redis:
    image: redis:7-alpine
    container_name: misp-redis
    command: ["redis-server", "--requirepass", "${MISP_REDIS_PASSWORD}"]
    networks:
      - soc-internal
    restart: unless-stopped

  # MISP Core
  misp:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    container_name: misp
    ports:
      - "80:80"
      - "443:443"
    environment:
      - MYSQL_HOST=misp-db
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=${MISP_DB_PASSWORD}
      - MYSQL_DATABASE=misp
      - REDIS_HOST=misp-redis
      - MISP_ADMIN_EMAIL=${MISP_ADMIN_EMAIL}
      - MISP_ADMIN_PASSWORD=${MISP_ADMIN_PASSWORD}
      - MISP_BASEURL=${MISP_BASE_URL}
    depends_on:
      - misp-db
      - misp-redis
    volumes:
      - misp-tmp:/var/www/MISP/app/tmp
      - misp-files:/var/www/MISP/app/files
      - ./misp-nginx/98-fastcgi-host.conf:/etc/nginx/snippets/98-fastcgi-host.conf:ro
      - ./misp-nginx/includes-misp:/etc/nginx/includes/misp:ro
      - ./misp-nginx/misp443:/etc/nginx/sites-enabled/misp443:ro
    networks:
      - soc-management
      - soc-internal
    restart: unless-stopped

volumes:
  misp-db-data:
  misp-tmp:
  misp-files:

networks:
  soc-internal:
    external: true
    name: soc-stack_soc-internal
  soc-management:
    external: true
    name: soc-stack_soc-management
