services:
  opencti-redis:
    image: redis:7-alpine
    container_name: opencti-redis
    restart: unless-stopped
    networks:
      - soc-internal

  opencti-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: opencti-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=opencti
    volumes:
      - opencti-es-data:/usr/share/elasticsearch/data
    networks:
      - soc-internal

  opencti-minio:
    image: minio/minio:latest
    container_name: opencti-minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${OPENCTI_MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${OPENCTI_MINIO_SECRET_KEY}
    command: server /data
    volumes:
      - opencti-minio-data:/data
    networks:
      - soc-internal

  opencti-rabbitmq:
    image: rabbitmq:3.12-management
    container_name: opencti-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${OPENCTI_RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${OPENCTI_RABBITMQ_PASSWORD}
    volumes:
      - opencti-rabbitmq-data:/var/lib/rabbitmq
    networks:
      - soc-internal

  opencti:
    image: opencti/platform:6.2.0
    container_name: opencti
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_OPTIONS=--max-old-space-size=2048
      - APP__PORT=3000
      - APP__BASE_URL=${OPENCTI_BASE_URL}
      - APP__ADMIN__EMAIL=${OPENCTI_ADMIN_EMAIL}
      - APP__ADMIN__PASSWORD=${OPENCTI_ADMIN_PASSWORD}
      - APP__ADMIN__TOKEN=${OPENCTI_ADMIN_TOKEN}
      - APP__APP_LOGS__LOGS_LEVEL=error
      - REDIS__HOSTNAME=opencti-redis
      - REDIS__PORT=6379
      - ELASTICSEARCH__URL=http://opencti-es:9200
      - MINIO__ENDPOINT=opencti-minio
      - MINIO__PORT=9000
      - MINIO__USE_SSL=false
      - MINIO__ACCESS_KEY=${OPENCTI_MINIO_ACCESS_KEY}
      - MINIO__SECRET_KEY=${OPENCTI_MINIO_SECRET_KEY}
      - RABBITMQ__HOSTNAME=opencti-rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__USERNAME=${OPENCTI_RABBITMQ_USER}
      - RABBITMQ__PASSWORD=${OPENCTI_RABBITMQ_PASSWORD}
      - SMTP__HOSTNAME=localhost
      - SMTP__PORT=25
    depends_on:
      - opencti-redis
      - opencti-es
      - opencti-minio
      - opencti-rabbitmq
    networks:
      - soc-management
      - soc-internal

  opencti-worker:
    image: opencti/worker:6.2.0
    container_name: opencti-worker
    restart: unless-stopped
    environment:
      - OPENCTI_URL=http://opencti:3000
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - WORKER_LOG_LEVEL=error
    depends_on:
      - opencti
    networks:
      - soc-internal

volumes:
  opencti-es-data:
  opencti-minio-data:
  opencti-rabbitmq-data:

networks:
  soc-internal:
    external: true
    name: soc-stack_soc-internal
  soc-management:
    external: true
    name: soc-stack_soc-management
